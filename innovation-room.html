<style>
.page-top { padding: 130px 0 44px; position: relative; }
.eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--font-display);
  font-size: 13px; font-weight: 700;
  color: var(--c-lilac);
  background: rgba(196,181,253,.08);
  border: 1.5px solid rgba(196,181,253,.25);
  padding: 7px 14px; border-radius: 100px;
  margin-bottom: 22px;
  transform: rotate(-2deg);
}
.page-top h1 {
  font-family: var(--font-display);
  font-size: clamp(40px, 7vw, 92px);
  font-weight: 800;
  letter-spacing: -2.5px;
  line-height: .92;
  margin-bottom: 20px;
  max-width: 900px;
}
.page-top h1 .pop {
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  display: inline-block; transform: rotate(-2deg);
}
.page-top .lede { font-size: 18px; color: var(--text); max-width: 540px; line-height: 1.55; }

/* ───── Shell: sticky status rail + card grid ───── */
.lab-wrap { padding: 0 28px; }
.lab-shell {
  max-width: 1240px;
  margin: 36px auto 0;
  display: grid;
  grid-template-columns: 230px 1fr;
  gap: 30px;
}
@media (max-width: 880px) { .lab-shell { grid-template-columns: 1fr; gap: 18px; } }

.lab-cats {
  position: sticky; top: 100px; align-self: flex-start;
  display: flex; flex-direction: column; gap: 6px;
  padding: 18px;
  background: #171d28;
  border: 1.5px solid rgba(255,255,255,.08);
  border-radius: 18px;
  box-shadow: 0 6px 0 0 #000;
  transform: rotate(-.4deg);
}
@media (max-width: 880px) {
  .lab-cats { position: static; flex-direction: row; flex-wrap: wrap; padding: 12px; transform: none; }
}
.lab-cats-head {
  font-family: var(--font-display);
  font-size: 11px; font-weight: 800;
  letter-spacing: .16em; text-transform: uppercase;
  color: var(--muted-light, #8a8f9c);
  padding: 4px 10px 10px;
  border-bottom: 1px solid rgba(255,255,255,.08);
  margin-bottom: 4px;
}
@media (max-width: 880px) { .lab-cats-head { display: none; } }
.lab-cat {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  font-family: var(--font-display);
  font-size: 13px; font-weight: 700;
  color: var(--muted-light, #8a8f9c);
  padding: 9px 12px;
  border-radius: 10px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: color .15s, background .15s, border-color .15s;
  background: none;
  width: 100%;
  text-align: left;
}
.lab-cat .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; box-shadow: 0 0 6px currentColor; }
.lab-cat:hover { color: #fff; background: rgba(255,255,255,.04); }
.lab-cat.active {
  color: #050608;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  box-shadow: 0 3px 0 0 #000;
}
.lab-cat.active .dot { background: #050608; box-shadow: none; }
.lab-cat .count {
  font-family: var(--font-display);
  font-size: 11px; font-weight: 800;
  background: rgba(255,255,255,.08);
  padding: 2px 8px; border-radius: 100px;
  margin-left: auto;
}
.lab-cat.active .count { background: rgba(0,0,0,.18); }

.lab-main { min-width: 0; }
.lab-controls {
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; margin-bottom: 20px; flex-wrap: wrap;
}
.lab-cat-label {
  font-family: var(--font-display);
  font-size: 21px; font-weight: 800;
  letter-spacing: -.5px;
}
.lab-search { position: relative; flex: 1; max-width: 340px; min-width: 220px; }
.lab-search svg { position: absolute; top: 50%; left: 14px; transform: translateY(-50%); width: 15px; height: 15px; fill: var(--muted-light,#8a8f9c); pointer-events: none; }
.lab-search input {
  width: 100%; padding: 11px 14px 11px 38px;
  background: #171d28;
  border: 1.5px solid rgba(255,255,255,.08);
  border-radius: 12px;
  font-family: var(--font-body); font-size: 13.5px; color: #fff;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.lab-search input::placeholder { color: var(--muted-light,#8a8f9c); }
.lab-search input:focus { border-color: rgba(254,248,61,.45); box-shadow: 0 0 0 3px rgba(254,248,61,.10); }

.lab-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
  gap: 18px;
}
.lab-card {
  position: relative;
  background: #171d28;
  border: 1.5px solid rgba(255,255,255,.08);
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
  display: flex; flex-direction: column;
  transition: transform .22s cubic-bezier(.22,1,.36,1), border-color .22s;
}
.lab-card:nth-child(odd) { transform: rotate(-.5deg); }
.lab-card:nth-child(even) { transform: rotate(.5deg); }
.lab-card:hover { transform: rotate(0) translateY(-3px); border-color: rgba(254,248,61,.30); }
.lab-card-img { height: 148px; background-size: cover; background-position: center; position: relative; display:flex; align-items:center; justify-content:center; background-color:#12161f; }
.lab-card-img.placeholder img { width: 40px; height: 40px; opacity: .38; filter: grayscale(1); }
.lab-card-body { padding: 17px 19px 19px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
.lab-card-top { display:flex; align-items:center; justify-content: space-between; gap: 8px; }
.lab-card-num { font-family: var(--font-display); font-size: 11px; font-weight: 800; letter-spacing: .1em; color: var(--muted-light,#8a8f9c); }
.lab-card-title { font-family: var(--font-display); font-size: 17px; font-weight: 800; letter-spacing: -.4px; line-height: 1.25; color: #fff; }
.lab-card-tagline { font-size: 12.5px; color: var(--muted-light,#8a8f9c); line-height: 1.5; }
.lab-card-meta { display: flex; align-items: center; gap: 8px; margin-top: auto; padding-top: 12px; border-top: 1px solid rgba(255,255,255,.05); }
.lab-card-readmore { font-family: var(--font-display); font-size: 12px; font-weight: 700; color: var(--accent); margin-left: auto; transition: transform .2s; }
.lab-card:hover .lab-card-readmore { transform: translateX(4px); }

.state { display: inline-flex; align-items: center; gap: 6px; flex-shrink: 0; font-family: var(--font-display); font-size: 10px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; padding: 4px 10px; border-radius: 100px; }
.state .d { width: 5px; height: 5px; border-radius: 50%; background: currentColor; box-shadow: 0 0 6px currentColor; }
.state img.d { width: 12px; height: 12px; border-radius: 0; box-shadow: none; }
.state.live { color: var(--accent); background: rgba(254,248,61,.10); border: 1px solid rgba(254,248,61,.30); }
.state.live .d { animation: liveBlink 1.6s ease infinite; }
.state.cooking { color: var(--c-lilac); background: rgba(196,181,253,.08); border: 1px solid rgba(196,181,253,.22); }
.state.shelved { color: var(--c-blue); background: rgba(125,211,252,.08); border: 1px solid rgba(125,211,252,.22); }
.state.dreaming { color: var(--c-mint); background: rgba(134,239,172,.08); border: 1px solid rgba(134,239,172,.22); }
.state.killed { color: #eb4545; background: rgba(235,69,69,.08); border: 1px solid rgba(235,69,69,.30); text-decoration: line-through; }
@keyframes liveBlink { 0%,100%{opacity:1} 50%{opacity:.35} }

.lab-empty { text-align: center; padding: 50px 20px; font-size: 14.5px; color: var(--muted-light,#8a8f9c); grid-column: 1 / -1; background: #171d28; border: 1.5px dashed rgba(255,255,255,.10); border-radius: 20px; }
.lab-empty img { width: 46px; height: 46px; display: block; margin: 0 auto 14px; opacity: .55; filter: grayscale(1); }

/* ───── Project detail view ───── */
#project-view { display: none; max-width: 860px; margin: 0 auto; padding: 130px 28px 80px; }
#project-view.open { display: block; }
#lab-list-view.hidden { display: none; }

.lab-back {

  margin-bottom: 26px; cursor: pointer;
  transition: color .15s, border-color .15s, background .15s;

.lab-back:hover { color: #fff; border-color: rgba(254,248,61,.30); background: rgba(254,248,61,.06); }

.proj-banner-card {

.proj-banner-meta { padding: 26px 30px; }
.proj-eyebrow { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-display); font-size: 11px; font-weight: 800; letter-spacing: .1em; color: var(--muted-light,#8a8f9c); margin-bottom: 12px; }
.proj-title {

.proj-tagline { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -.3px; margin-bottom: 14px; }
.proj-meta-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

.proj-works { display: flex; align-items: center; gap: 10px; padding: 16px 20px; background: rgba(254,248,61,.04); border: 1px solid rgba(254,248,61,.16); border-radius: 16px; margin-bottom: 30px; flex-wrap: wrap; }
.proj-works .lbl { font-family: var(--font-display); font-size: 11px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); margin-right: 4px; }
.proj-works .logo-chip { display: inline-flex; align-items: center; gap: 7px; background: #171d28; border: 1px solid rgba(255,255,255,.10); padding: 6px 12px 6px 8px; border-radius: 100px; font-family: var(--font-body); font-size: 13px; font-weight: 500; color: #fff; }
.proj-works .logo-chip img { width: 18px; height: 18px; border-radius: 5px; object-fit: contain; background:#fff; padding: 1px; }

.proj-body p { font-size: 15.5px; color: var(--text); line-height: 1.8; margin-bottom: 16px; }
.proj-body p b { color: #fff; font-weight: 600; }
.proj-body h3 { font-family: var(--font-display); font-size: 20px; font-weight: 800; letter-spacing: -.4px; color: #fff; margin: 32px 0 12px; display: flex; align-items: center; gap: 10px; }
.proj-body h3::before { content:""; width: 5px; height: 20px; flex-shrink: 0; background: linear-gradient(180deg, var(--accent), var(--accent-2)); border-radius: 3px; }
.proj-body .sub-label { font-family: var(--font-display); font-size: 12.5px; font-weight: 700; color: var(--accent); margin: -4px 0 12px; display: block; }
.proj-body ul { list-style: none; margin: 12px 0 22px; display: flex; flex-direction: column; gap: 8px; }
.proj-body ul li { display: flex; align-items: flex-start; gap: 11px; font-size: 14.5px; color: var(--text); line-height: 1.6; padding: 12px 15px; background: rgba(255,255,255,.02); border: 1px solid rgba(255,255,255,.05); border-radius: 12px; }
.proj-body ul li::before { content: "✦"; color: var(--accent); font-size: 9px; flex-shrink: 0; margin-top: 5px; }
.proj-body ul li b { color: #fff; font-weight: 600; }
.proj-callout { position: relative; background: rgba(254,248,61,.05); border: 1px solid rgba(254,248,61,.20); border-left: 3px solid var(--accent); border-radius: 14px; padding: 17px 21px; margin: 20px 0; font-size: 14.5px; line-height: 1.7; color: var(--text); transform: rotate(-.5deg); }
.proj-callout strong { color: #fff; font-weight: 600; }
.proj-directive {
  position: relative; margin: 28px 0 6px; padding: 22px 24px 20px;
  background: linear-gradient(140deg, rgba(254,248,61,.10), rgba(254,248,61,.03));
  border: 1.5px solid rgba(254,248,61,.32); border-radius: 18px; transform: rotate(.5deg);
}
.proj-directive .head { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-display); font-size: 11px; font-weight: 800; letter-spacing: .18em; text-transform: uppercase; color: #050608; background: var(--accent); padding: 5px 12px; border-radius: 100px; margin-bottom: 14px; }
.proj-directive p { font-size: 15px; line-height: 1.7; color: var(--text); margin-bottom: 10px; }
.proj-directive p b { color: #fff; font-weight: 600; }
.proj-directive ul { list-style: none; padding: 0; margin: 6px 0 0; display: grid; gap: 6px; }
.proj-directive ul li { position: relative; padding-left: 22px; font-size: 14px; color: var(--text); background: none; border: none; }
.proj-directive ul li::before { content: "→"; position: absolute; left: 0; top: 0; color: var(--accent); font-weight: 800; }
.proj-signoff { color: var(--muted-light,#8a8f9c); font-size: 13.5px; font-style: italic; border-top: 1px solid rgba(255,255,255,.08); padding-top: 18px; margin-top: 6px; }
</style>

<script>
const HELMET = 'https://www.fortized.com/Icons/FortizedHelmet.png';
const LOGO = {
  fortized: 'https://www.fortized.com/Fortized%20icon.png',
  discord: 'https://static.wikia.nocookie.net/dcpfr/images/0/09/Discordicon.png/revision/latest/scale-to-width-down/1000?cb=20230511153016&path-prefix=fr',
  roblox: 'https://upload.wikimedia.org/wikipedia/commons/7/70/Roblox_Corporation_2025_logo.svg'
};

const PROJECTS = {
  soundboard: {
    number: '049', status: 'cooking', statusLabel: 'cooking',
    title: 'a soundboard for voice chat', tagline: 'clips and stings you can drop mid-call without alt-tabbing for them.',
    date: 'started jun 2026',
    banner: 'https://raw.githubusercontent.com/StawWasTaken/Swiftaw/refs/heads/main/SwiftawLab-Soundboard.png',
    works: [
      { logo: LOGO.fortized, label: 'Fortized' },
      { logo: LOGO.discord, label: 'Discord' },
      { logo: LOGO.roblox, label: 'Roblox' }
    ],
    content: `
      <p>we spend a lot of time in voice chat - Fortized Party Rooms, Discord calls, Roblox with friends - and every time someone says "wait i have the perfect sound for this" and then goes hunting for the file, the moment's already gone. so we're building the fix.</p>
      <p>small always-on-top panel, a grid of clips, hit one and it plays into your mic. that's the whole idea.</p>
      <h3>what it does so far</h3>
      <ul>
        <li><b>hotkey grid</b> - bind a clip to a shortcut, trigger it without touching the panel.</li>
        <li><b>mic passthrough</b> - your voice and the clip blend live, no muting yourself first.</li>
        <li><b>boards per group</b> - build a different grid for different friends, different games.</li>
        <li><b>quick trimming</b> - grab a short clip and cut it down without leaving the app.</li>
      </ul>
      <div class="proj-callout"><strong>not a Fortized-only tool.</strong> it sits underneath whatever you're already using to talk - that's the point.</div>
      <p class="proj-signoff">mixer routing is the hard part. we're not rushing it.</p>
    `
  },
  swiftign: {
    number: '048', status: 'live', statusLabel: 'shipped · v1',
    title: 'swiftign', tagline: 'the internal design language we build everything in.',
    date: '13 jun 2026',
    banner: '/SwiftawLab-Swiftign.png',
    content: `
      <p>swiftign is the internal design system we use across every Swiftaw and Fortized surface. born in 2026 while we were rebuilding both sites at the same time and realised we kept reaching for the same little tricks.</p>
      <p>so we gave it a name and wrote it down.</p>
      <h3>the vibe, in one breath</h3>
      <p>dark, slightly playful, mildly off-axis. things tilt. things wobble a little. nothing is perfectly aligned because perfectly aligned is boring. <b>stickers, capsules, soft chips, 3D buttons</b> - all sitting on a near-black background with a single warm yellow doing most of the heavy lifting.</p>
      <div class="proj-callout"><strong>rule of thumb:</strong> if it looks like a SaaS dashboard, you went too far. if it looks like a sticker someone slapped on a laptop, you're close.</div>
      <h3>the tokens</h3>
      <span class="sub-label">colours, type, surfaces. swap freely per product.</span>
      <p><b>backgrounds</b> stay dark and near-neutral. <b>one yellow accent</b> per product carries the brand. <b>six soft tints</b> (yellow / pink / blue / mint / lilac / peach) handle everything else - chips, callouts, status pills, sticker tints.</p>
      <h3>the components</h3>
      <span class="sub-label">the building blocks we lean on most.</span>
      <ul>
        <li><b>floating capsule nav</b> - centered, blurred, rounded-999, logo handles home. yellow gradient active pill, mobile drawer with sliding "→".</li>
        <li><b>3D buttons</b> (<code>.btn-3d</code> / <code>.btn-3d-ghost</code>) with hard offset shadows that press in on click.</li>
        <li><b>sticker cards</b> with subtle tilts that straighten on hover.</li>
        <li><b>soft chip tokens</b> in the six tints, used for status, eyebrows, callouts.</li>
        <li><b>floating FontAwesome decos</b> that bob gently between sections.</li>
        <li><b>Twemoji + Fortized custom emojis</b> (joyster, leafen, knight) used inline as real text.</li>
      </ul>
      <div class="proj-callout"><strong>copy tone:</strong> lowercase, conversational, no em-dashes (only "-"). short sentences. zero corporate. say "we build weird stuff", not "we are an innovative studio".</div>
      <h3>how to use it</h3>
      <span class="sub-label">a framework, not a cage.</span>
      <p>swiftign is meant to be <b>remixed per product</b>. swap the accent. add a tint. invent your own sticker shape. the only fixed things are the <b>off-axis playfulness, the dark canvas, the typographic stack, and the tone of voice</b>. everything else is fair game.</p>
      <div class="proj-directive">
        <span class="head">★ swiftign directives</span>
        <p>when you're building a new Swiftaw or Fortized app, treat <b>swiftaw.com</b> and <b>fortized.com</b> as your reference textures. open them, scroll them, screenshot them, and <b>take inspiration</b> - don't trace them. you're allowed to invent.</p>
        <ul>
          <li>keep the dark canvas, the single-yellow-accent rule, and the Syne + DM Sans pairing.</li>
          <li>use stickers, capsules and 3D buttons before you reach for anything generic.</li>
          <li>let things tilt slightly. straighten on hover. never align everything to a perfect grid.</li>
          <li>match the voice: lowercase, short, a little weird, never corporate.</li>
          <li>everything else - layout, components, surprise moments - invent freely.</li>
        </ul>
      </div>
      <p class="proj-signoff">that's the whole system. this page is built with it.</p>
    `
  }
};

function statusOrder(s){ return {live:0, cooking:1, dreaming:2, shelved:3, killed:4}[s] ?? 9; }
function escAttr(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

let activeStatus = 'All';
let labSearch = '';

function getStatuses(){
  return [
    {key:'All', label:'All Projects'},
    {key:'live', label:'Live'},
    {key:'cooking', label:'Cooking'},
    {key:'dreaming', label:'Dreaming'},
    {key:'shelved', label:'Shelved'},
    {key:'killed', label:'Killed'}
  ];
}

function renderCats(){
  const cont = document.getElementById('lab-cats');
  const counts = {};
  Object.values(PROJECTS).forEach(p => { counts[p.status] = (counts[p.status]||0) + 1; });
  const total = Object.values(PROJECTS).length;
  cont.innerHTML = `<div class="lab-cats-head">status</div>` + getStatuses().map(s => {
    const count = s.key === 'All' ? total : (counts[s.key] || 0);
    return `<a class="lab-cat${s.key===activeStatus?' active':''}" data-status="${s.key}"><span class="dot"></span>${s.label}<span class="count">${count}</span></a>`;
  }).join('');
  cont.querySelectorAll('.lab-cat').forEach(el => el.addEventListener('click', () => {
    activeStatus = el.dataset.status;
    document.getElementById('lab-cat-label').textContent = activeStatus === 'All' ? 'All Projects' : getStatuses().find(s=>s.key===activeStatus).label + ' Projects';
    renderCats(); renderGrid();
  }));
}

function imgOrPlaceholder(banner, cls){
  return banner
    ? `<div class="${cls}" style="background-image:url('${escAttr(banner)}');"></div>`
    : `<div class="${cls} placeholder"><img src="${HELMET}" alt="image coming soon"></div>`;
}

function buildCard(id, p){
  return `
    <article class="lab-card" onclick="openProject('${escAttr(id)}')">
      ${imgOrPlaceholder(p.banner, 'lab-card-img')}
      <div class="lab-card-body">
        <div class="lab-card-top">
          <span class="lab-card-num">№ ${escAttr(p.number)}</span>
          <span class="state ${p.status}"><span class="d"></span>${escAttr(p.statusLabel)}</span>
        </div>
        <div class="lab-card-title">${escAttr(p.title)}</div>
        <div class="lab-card-tagline">${escAttr(p.tagline)}</div>
        <div class="lab-card-meta"><span class="lab-card-readmore">Read more →</span></div>
      </div>
    </article>`;
}

function renderGrid(){
  const grid = document.getElementById('lab-grid');
  const q = labSearch.toLowerCase().trim();
  const entries = Object.entries(PROJECTS)
    .filter(([id,p]) => activeStatus === 'All' || p.status === activeStatus)
    .filter(([id,p]) => !q || p.title.toLowerCase().includes(q) || p.tagline.toLowerCase().includes(q))
    .sort((a,b) => statusOrder(a[1].status) - statusOrder(b[1].status) || b[1].number.localeCompare(a[1].number));
  if (!entries.length){
    grid.innerHTML = `<div class="lab-empty"><img src="${HELMET}" alt="">still under construction in this category. check back soon.</div>`;
    return;
  }
  grid.innerHTML = entries.map(([id,p]) => buildCard(id,p)).join('');
}

function filterLab(v){ labSearch = v || ''; renderGrid(); }

function renderProject(id){
  const p = PROJECTS[id]; if (!p) return false;
  const works = (p.works||[]).length ? `
    <div class="proj-works">
      <span class="lbl">works with</span>
      ${p.works.map(w => `<span class="logo-chip"><img src="${w.logo}" alt="">${escAttr(w.label)}</span>`).join('')}
    </div>` : '';
  document.getElementById('project-content').innerHTML = `
    <div class="proj-banner-card">
      ${imgOrPlaceholder(p.banner, 'proj-banner-img')}
      <div class="proj-banner-meta">
        <div class="proj-eyebrow">project № ${escAttr(p.number)} · <span class="state ${p.status}"><span class="d"></span>${escAttr(p.statusLabel)}</span></div>
        <div class="proj-title">${escAttr(p.title)}</div>
        <div class="proj-tagline">${escAttr(p.tagline)}</div>
        <div class="proj-meta-row" style="color:var(--muted-light,#8a8f9c); font-size:12.5px;">${escAttr(p.date)}</div>
      </div>
    </div>
    ${works}
    <div class="proj-body">${p.content}</div>
  `;
  document.title = `${p.title} - Swiftaw Lab`;
  document.getElementById('lab-list-view').classList.add('hidden');
  document.getElementById('project-view').classList.add('open');
  return true;
}

function openProject(id){
  if (!PROJECTS[id]) return;
  const url = new URL(window.location.href);
  url.searchParams.set('project', id);
  history.pushState({projectId:id}, '', url.toString());
  renderProject(id);
  window.scrollTo({top:0, behavior:'smooth'});
}
function closeProject(){
  const url = new URL(window.location.href);
  url.searchParams.delete('project');
  history.pushState({projectId:null}, '', url.toString());
  document.getElementById('lab-list-view').classList.remove('hidden');
  document.getElementById('project-view').classList.remove('open');
  document.title = 'Lab - Swiftaw';
  window.scrollTo({top:0, behavior:'smooth'});
}
window.addEventListener('popstate', e => {
  const id = e.state && e.state.projectId;
  if (id && PROJECTS[id]) renderProject(id);
  else {
    document.getElementById('lab-list-view').classList.remove('hidden');
    document.getElementById('project-view').classList.remove('open');
    document.title = 'Lab - Swiftaw';
  }
  window.scrollTo({top:0, behavior:'smooth'});
});

renderCats();
renderGrid();
(function(){
  const params = new URLSearchParams(window.location.search);
  const id = params.get('project');
  if (id && PROJECTS[id]) { renderProject(id); history.replaceState({projectId:id}, '', window.location.href); }
})();
</script>
<script src="/css/swiftaw.js"></script>
</body>
</html>
