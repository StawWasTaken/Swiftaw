<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swiftawplex – Virtual HQ</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="/SwiftawFavicon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ════════════ LOGIN SCREEN ════════════ -->
<div id="login-screen">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="login-logo">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <rect width="48" height="48" rx="12" fill="#241f3c"/>
        <text x="24" y="32" text-anchor="middle" fill="#fff93e" font-family="Inter" font-weight="800" font-size="20">S</text>
      </svg>
      <h1>Swiftawplex</h1>
      <p class="login-subtitle">Employee Virtual HQ</p>
    </div>
    <form id="login-form" autocomplete="off">
      <div class="input-group">
        <label for="login-user">Username</label>
        <input type="text" id="login-user" placeholder="Enter your username" required>
      </div>
      <div class="input-group">
        <label for="login-pass">Password</label>
        <input type="password" id="login-pass" placeholder="Enter your password" required>
      </div>
      <p id="login-error" class="login-error"></p>
      <button type="submit" class="btn-primary" id="login-btn">Enter Swiftawplex</button>
    </form>
    <p class="login-footer">Authorized Swiftaw employees only</p>
  </div>
</div>

<!-- ════════════ MAIN APP ════════════ -->
<div id="app" class="hidden">

  <!-- Top Bar -->
  <div id="top-bar">
    <div class="top-left">
      <div class="logo-mark">S</div>
      <span class="top-title">Swiftawplex</span>
      <span id="current-zone" class="zone-badge">Lobby</span>
    </div>
    <div class="top-center">
      <span id="online-count" class="online-badge">1 online</span>
    </div>
    <div class="top-right">
      <span id="user-display" class="user-badge"></span>
      <button id="btn-minimap" class="top-btn" title="Toggle Minimap">🗺</button>
      <button id="btn-inventory" class="top-btn" title="Inventory">🎒</button>
      <button id="btn-settings" class="top-btn" title="Settings">⚙</button>
      <button id="btn-logout" class="top-btn" title="Logout">⏻</button>
    </div>
  </div>

  <!-- 3D Canvas -->
  <canvas id="world-canvas"></canvas>

  <!-- Zone Indicators -->
  <div id="zone-labels"></div>

  <!-- Minimap -->
  <div id="minimap" class="panel hidden">
    <div class="panel-header">
      <span>Map</span>
      <button class="panel-close" data-close="minimap">×</button>
    </div>
    <canvas id="minimap-canvas" width="240" height="240"></canvas>
  </div>

  <!-- Chat Panel -->
  <div id="chat-panel" class="panel">
    <div class="panel-header">
      <span>Chat</span>
      <div class="chat-tabs">
        <button class="chat-tab active" data-channel="global">Global</button>
        <button class="chat-tab" data-channel="zone">Zone</button>
        <button class="chat-tab" data-channel="team">Team</button>
      </div>
      <button class="panel-toggle" id="chat-toggle">▼</button>
    </div>
    <div id="chat-messages" class="chat-messages"></div>
    <form id="chat-form" class="chat-input-wrap">
      <input type="text" id="chat-input" placeholder="Type a message..." maxlength="500" autocomplete="off">
      <button type="submit" class="chat-send">➤</button>
    </form>
  </div>

  <!-- Player List -->
  <div id="player-list" class="panel right-panel">
    <div class="panel-header">
      <span>Employees Online</span>
    </div>
    <div id="player-list-items"></div>
  </div>

  <!-- Creation Panel -->
  <div id="creation-panel" class="panel right-panel hidden">
    <div class="panel-header">
      <span>Create</span>
      <button class="panel-close" data-close="creation-panel">×</button>
    </div>
    <div class="creation-tools">
      <button class="create-btn" data-type="cube" title="Place Cube">
        <span class="create-icon">◻</span>
        <span>Cube</span>
      </button>
      <button class="create-btn" data-type="sphere" title="Place Sphere">
        <span class="create-icon">●</span>
        <span>Sphere</span>
      </button>
      <button class="create-btn" data-type="cylinder" title="Place Cylinder">
        <span class="create-icon">▮</span>
        <span>Pillar</span>
      </button>
      <button class="create-btn" data-type="wall" title="Place Wall">
        <span class="create-icon">▬</span>
        <span>Wall</span>
      </button>
      <button class="create-btn" data-type="light" title="Place Light">
        <span class="create-icon">☀</span>
        <span>Light</span>
      </button>
      <button class="create-btn" data-type="sign" title="Place Sign">
        <span class="create-icon">🪧</span>
        <span>Sign</span>
      </button>
    </div>
    <div class="creation-options">
      <label>Color</label>
      <input type="color" id="create-color" value="#fff93e">
      <label>Scale</label>
      <input type="range" id="create-scale" min="0.5" max="5" step="0.5" value="1">
      <span id="create-scale-val">1x</span>
    </div>
    <button id="delete-mode-btn" class="btn-danger">Delete Mode: OFF</button>
  </div>

  <!-- Build Mode Toolbar -->
  <div id="build-toolbar" class="hidden">
    <button id="btn-build" class="toolbar-btn" title="Toggle Build Mode">🔨 Build</button>
  </div>

  <!-- Controls Help -->
  <div id="controls-help">
    <span>WASD</span> Move &nbsp;
    <span>Mouse</span> Look &nbsp;
    <span>Space</span> Jump &nbsp;
    <span>E</span> Interact &nbsp;
    <span>B</span> Build &nbsp;
    <span>Enter</span> Chat &nbsp;
    <span>M</span> Map &nbsp;
    <span>Click</span> Lock cursor
  </div>

  <!-- Interaction Prompt -->
  <div id="interact-prompt" class="hidden">
    <span>Press <kbd>E</kbd> to interact</span>
  </div>

  <!-- Loading Overlay -->
  <div id="loading-overlay">
    <div class="loader"></div>
    <p>Entering Swiftawplex...</p>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="modal-close" data-modal="settings-modal">×</button>
      </div>
      <div class="modal-body">
        <div class="setting-row">
          <label>Render Distance</label>
          <input type="range" id="render-distance" min="50" max="500" value="200">
        </div>
        <div class="setting-row">
          <label>Mouse Sensitivity</label>
          <input type="range" id="mouse-sensitivity" min="1" max="20" value="8">
        </div>
        <div class="setting-row">
          <label>Show Name Tags</label>
          <input type="checkbox" id="show-nametags" checked>
        </div>
        <div class="setting-row">
          <label>Sound Effects</label>
          <input type="checkbox" id="sound-effects" checked>
        </div>
      </div>
    </div>
  </div>

</div>

<script type="module" src="js/supabase-config.js"></script>
<script type="module" src="js/auth.js"></script>
<script type="module" src="js/world.js"></script>
<script type="module" src="js/player.js"></script>
<script type="module" src="js/chat.js"></script>
<script type="module" src="js/ui.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
