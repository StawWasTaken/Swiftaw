<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tithonia — Swiftaw</title>
<meta name="description" content="Tithonia — the AI-powered digital ecosystem by swiftaw. Coming soon.">
<meta name="theme-color" content="#0a0a0a">
<link rel="icon" type="image/png" href="/SwiftawFavicon.png">
<link href="https://fonts.cdnfonts.com/css/afronaut-test" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --brand-deep: #241f3c;
  --brand-yellow: #fff93e;
  --brand-orange: #ff9c3c;
  --font-sans: 'Inter', -apple-system, sans-serif;
  --font-display: 'Afronaut Test', 'Newsreader', sans-serif;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a; color: #fff;
  font-family: var(--font-sans);
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  overflow: hidden; position: relative;
}
a { text-decoration: none; color: inherit; }

/* Background glow */
.bg-glow {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 700px; height: 700px; border-radius: 50%;
  background: radial-gradient(circle, rgba(36,31,60,.8) 0%, rgba(255,249,62,.04) 40%, transparent 70%);
  pointer-events: none;
  animation: pulse 8s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  50% { transform: translate(-50%, -50%) scale(1.1); opacity: .7; }
}

.content {
  text-align: center; position: relative; z-index: 2; padding: 40px;
}

/* Logo */
.tithonia-logo-wrap { margin-bottom: 48px; display: flex; justify-content: center; }
.tithonia-logo-wrap img { height: 36px; filter: brightness(10); }

/* Wordmark */
.tithonia-wordmark {
  font-family: var(--font-display);
  font-size: clamp(3rem, 10vw, 7rem);
  font-weight: 400; letter-spacing: -.03em;
  line-height: 1;
  background: linear-gradient(135deg, var(--brand-yellow) 0%, var(--brand-orange) 50%, var(--brand-deep) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 24px;
}

.tithonia-sub {
  font-size: 16px; color: rgba(255,255,255,.4);
  line-height: 1.7; max-width: 400px; margin: 0 auto 48px;
}

/* Gradient divider */
.tithonia-bar {
  width: 60px; height: 2px;
  background: linear-gradient(90deg, var(--brand-yellow), var(--brand-orange), var(--brand-deep));
  border-radius: 2px; margin: 0 auto 40px;
}

.tithonia-status {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 12px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
  color: rgba(255,255,255,.3);
  border: 1px solid rgba(255,255,255,.08);
  padding: 10px 20px; border-radius: 100px;
  margin-bottom: 40px;
}
.tithonia-status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--brand-yellow);
  box-shadow: 0 0 8px rgba(255,249,62,.6);
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink {
  0%, 100% { opacity: 1; } 50% { opacity: .3; }
}

.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 600; color: rgba(255,255,255,.3);
  transition: color .15s;
}
.back-link:hover { color: rgba(255,255,255,.7); }
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="content">
  <div class="tithonia-logo-wrap">
    <img src="/SwiftawLogo.png" alt="swiftaw">
  </div>
  <div class="tithonia-wordmark">Tithonia</div>
  <div class="tithonia-bar"></div>
  <p class="tithonia-sub">The AI-powered digital ecosystem by Swiftaw. Intelligence meets connection.</p>
  <div class="tithonia-status">
    <div class="tithonia-status-dot"></div>
    Coming soon
  </div>
  <br><br>
  <a href="/" class="back-link">&larr; Back to swiftaw</a>
</div>
</body>
</html>
