<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In to Swiftaw Cloud</title>
<meta name="description" content="Sign in to your Swiftaw Cloud account to manage all your product identities.">
<meta name="theme-color" content="#ffffff">
<link rel="icon" type="image/png" href="/SwiftawCloudFavicon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
::selection { background: rgba(255,249,62,.25); }

:root {
  --brand-deep: #241f3c;
  --brand-yellow: #fff93e;
  --brand-orange: #ff9c3c;
  --bg: #ffffff;
  --text: #0a0a0a;
  --text-light: #555;
  --text-muted: #888;
  --border: #e5e5e5;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --max-w: 1200px;
  --pad: clamp(1.5rem, 4vw, 5rem);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased;
  display: flex;
  min-height: 100vh;
}
img { display: block; -webkit-user-drag: none; user-select: none; }
a { text-decoration: none; color: inherit; }

.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  width: 100%;
}

/* ═══ LEFT SIDE - HERO ═══ */
.hero {
  background: linear-gradient(135deg, rgba(255,156,60,.15) 0%, rgba(255,156,60,.1) 100%), url('/Swiftaw Banner.png') center/cover fixed;
  color: #fff;
  padding: var(--pad);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
}

.hero-content {
  max-width: 400px;
}

.hero h1 {
  font-size: clamp(2rem, 4vw, 2.8rem);
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 16px;
  letter-spacing: -.01em;
}

.hero p {
  font-size: 16px;
  color: rgba(255,255,255,.7);
  line-height: 1.7;
  margin-bottom: 40px;
}

/* ═══ RIGHT SIDE - FORM ═══ */
.form-section {
  padding: var(--pad);
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.form-inner {
  max-width: 380px;
}

.form-header {
  margin-bottom: 40px;
}

.form-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 32px;
}

.form-logo img {
  height: 24px;
  width: auto;
}

.form-title {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 8px;
}

.form-subtitle {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.6;
}

form {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}

input {
  padding: 12px 14px;
  border: 1.5px solid var(--brand-yellow);
  border-radius: 8px;
  font-size: 14px;
  font-family: var(--font-sans);
  transition: border-color .2s, box-shadow .2s, background .2s;
  background: var(--brand-yellow);
  color: var(--text);
}

input:focus {
  outline: none;
  border-color: var(--brand-orange);
  background: var(--brand-yellow);
  box-shadow: 0 0 0 3px rgba(255,156,60,.2);
}

input::placeholder {
  color: rgba(10, 10, 10, .5);
}

.form-options {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 13px;
}

.form-options a {
  color: var(--brand-orange);
  font-weight: 600;
}

.form-options a:hover {
  text-decoration: underline;
}

button {
  padding: 12px 16px;
  background: var(--brand-deep);
  color: var(--brand-yellow);
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .2s, transform .2s;
  margin-top: 8px;
}

button:hover {
  opacity: .9;
  transform: translateY(-1px);
}

button:active {
  transform: translateY(0);
}

button:disabled {
  opacity: .5;
  cursor: not-allowed;
  transform: none;
}

.form-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 24px 0;
  color: var(--text-muted);
  font-size: 12px;
}

.form-divider::before,
.form-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.oauth-button {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: transparent;
  border: 1.5px solid var(--border);
  color: var(--text);
  padding: 12px 16px;
  border-radius: 8px;
  font-weight: 500;
  transition: background .2s, border-color .2s;
}

.oauth-button:hover {
  background: #f5f5f5;
  border-color: var(--brand-yellow);
}

.form-footer {
  margin-top: 24px;
  text-align: center;
  font-size: 13px;
}

.form-footer a {
  color: var(--brand-orange);
  font-weight: 600;
}

.form-footer a:hover {
  text-decoration: underline;
}

.error-message {
  background: rgba(255, 100, 100, .1);
  border: 1px solid rgba(255, 100, 100, .3);
  color: #d32f2f;
  padding: 12px 14px;
  border-radius: 8px;
  font-size: 13px;
  display: none;
  margin-bottom: 16px;
}

.error-message.show {
  display: block;
}

@media (max-width: 900px) {
  .container {
    grid-template-columns: 1fr;
  }

  .hero {
    min-height: 200px;
    justify-content: flex-end;
  }

  .form-section {
    min-height: auto;
  }
}
</style>
</head>
<body>

<div class="container">
  <!-- ═══ LEFT: HERO ═══ -->
  <div class="hero">
    <div class="hero-content">
      <h1>Welcome Back.</h1>
      <p>Sign in to your Swiftaw Cloud account to access all your connected identities and products.</p>
    </div>
  </div>

  <!-- ═══ RIGHT: LOGIN FORM ═══ -->
  <div class="form-section">
    <div class="form-inner">
      <div class="form-header">
        <div class="form-logo">
          <img src="/Cloud logo.png" alt="Swiftaw Cloud">
        </div>
        <h2 class="form-title">Sign In</h2>
        <p class="form-subtitle">Access your unified identity platform</p>
      </div>

      <form id="login-form">
        <div class="error-message" id="error-message"></div>

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="your_username" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>

        <button type="submit">Sign In</button>
      </form>

      <div class="form-divider">or</div>

      <!-- OAuth removed - using Cloud native auth only -->

      <div class="form-footer">
        Don't have an account? <a href="/cloud/signup">Create one</a>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://eujglvqqhrkyhyuqagse.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV1amdsdnFxaHJreWh5dXFhZ3NlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMjQ4NjUsImV4cCI6MjA5MDgwMDg2NX0.HjsPbBICvRnM1OTqafdP90grjw9lj1RfR_G_YHicMGY';

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errorDiv = document.getElementById('error-message');

  errorDiv.classList.remove('show');

  if (!username || !password) {
    errorDiv.textContent = 'Please enter username and password';
    errorDiv.classList.add('show');
    return;
  }

  try {
    // Query cloud_users by username
    const response = await fetch(
      `${SUPABASE_URL}/rest/v1/cloud_users?username=eq.${encodeURIComponent(username)}&select=id,username,email`,
      {
        headers: {
          'apikey': SUPABASE_KEY,
          'Accept': 'application/json'
        }
      }
    );

    const users = await response.json();

    if (!users || users.length === 0) {
      throw new Error('Invalid username or password');
    }

    const user = users[0];

    // Query to verify password
    const passwordCheck = await fetch(
      `${SUPABASE_URL}/rest/v1/cloud_users?id=eq.${encodeURIComponent(user.id)}&password=eq.${encodeURIComponent(password)}&select=id`,
      {
        headers: {
          'apikey': SUPABASE_KEY,
          'Accept': 'application/json'
        }
      }
    );

    const passwordResult = await passwordCheck.json();

    if (!passwordResult || passwordResult.length === 0) {
      throw new Error('Invalid username or password');
    }

    // Store session
    localStorage.setItem('cloud_user_id', user.id);
    localStorage.setItem('cloud_user_username', user.username);
    localStorage.setItem('cloud_session', JSON.stringify({
      user: { id: user.id, username: user.username, email: user.email },
      logged_in_at: Date.now()
    }));

    // Redirect to dashboard
    window.location.href = '/cloud/dashboard';

  } catch (error) {
    errorDiv.textContent = error.message || 'Failed to sign in. Please check your credentials.';
    errorDiv.classList.add('show');
  }
});

// Check if user is already logged in
function checkAuth() {
  const userId = localStorage.getItem('cloud_user_id');
  if (userId) {
    // User is already logged in, redirect to dashboard
    window.location.href = '/cloud/dashboard';
  }
}

checkAuth();
</script>
</body>
</html>
