<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Fortized</title>
    <meta name="description" content="The page you are looking for has vanished into the digital catacombs">
    <meta name="theme-color" content="#fff93e">
    <link rel="icon" type="image/png" href="/Fortized icon.png" id="favicon">
    
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        ::selection{background:rgba(255,249,62,.2);}
        :root {
            --accent: #fff93e;
            --accent-glow: rgba(255, 249, 62, 0.3);
            --bg: #060810;
            --panel: rgba(10, 13, 20, 0.75);
            --border: rgba(255, 255, 255, 0.08);
            --text-muted: #8a94a6;
            --font-display: 'Syne', sans-serif;
            --font-body: 'DM Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: white; 
            font-family: var(--font-body); 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }

        /* ── Advanced Background ── */
        .spotlight {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255, 249, 62, 0.08) 0%, transparent 40%);
            z-index: 1;
            pointer-events: none;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
            opacity: 0.2;
            z-index: 0;
        }

        /* ── Error Container ── */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 480px;
            padding: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
            text-decoration: none;
            animation: fadeInDown 0.8s ease;
        }

        .logo img { width: 32px; filter: drop-shadow(0 0 10px var(--accent-glow)); }
        .logo span { font-family: var(--font-display); font-size: 20px; font-weight: 800; color: #fff; }

        /* ── 404 Glass Card ── */
        .card {
            background: var(--panel);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 60px 40px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .error-code {
            font-family: var(--font-display);
            font-size: 110px;
            font-weight: 800;
            line-height: 1;
            color: var(--accent);
            margin-bottom: 10px;
            position: relative;
            display: inline-block;
        }

        /* Subtle Glitch */
        .error-code::before {
            content: "404";
            position: absolute;
            left: 0; top: 0;
            width: 100%; height: 100%;
            color: #60a5fa;
            opacity: 0.3;
            z-index: -1;
            animation: glitch 4s infinite;
        }

        .title { font-family: var(--font-display); font-size: 24px; margin-bottom: 12px; }
        .desc { color: var(--text-muted); font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
        
        .path-box {
            background: rgba(255,255,255,0.04);
            padding: 8px 16px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 13px;
            color: var(--accent);
            border: 1px solid rgba(255,249,62,0.1);
            margin-bottom: 32px;
            display: inline-block;
        }

        /* ── Actions ── */
        .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        
        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 20px var(--accent-glow); }
        
        .btn-secondary { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border); }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }

        /* ── Animations ── */
        @keyframes glitch {
            0% { transform: translate(0); }
            2% { transform: translate(-3px, 2px); }
            4% { transform: translate(3px, -1px); }
            6% { transform: translate(0); }
            100% { transform: translate(0); }
        }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 480px) {
            .card { padding: 40px 20px; }
            .error-code { font-size: 80px; }
            .actions { flex-direction: column; }
            .btn { justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="spotlight" id="spotlight"></div>
    <div class="bg-grid"></div>

    <div class="container">
        <a href="/" class="logo">
            <img src="/Fortized icon.png" alt="Logo">
            <span>Fortized</span>
        </a>

        <div class="card">
            <h1 class="error-code">404</h1>
            <h2 class="title">Lost in the grid?</h2>
            <p class="desc">The coordinates you entered don't lead to a valid destination. Let's get you back on track.</p>
            
            <div class="path-box" id="path-display">/loading...</div>

            <div class="actions">
                <a href="javascript:history.back()" class="btn btn-secondary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    Go Back
                </a>
                <a href="/" class="btn btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    Return Home
                </a>
            </div>
        </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="error-footer">
    <p>Lost? <a href="/support">Contact support</a> &middot; <a href="/legal">Legal</a></p>
  </div>
</div>

<script>
  // Show the attempted path
  var pathEl = document.getElementById('error-path');
  if (pathEl) pathEl.textContent = window.location.pathname;
</script>
</body>
</html>
