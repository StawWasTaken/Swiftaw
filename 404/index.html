<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found · Swiftaw</title>
<meta name="description" content="The page you were looking for doesn't exist.">
<link rel="icon" type="image/png" href="/SwiftawFavicon.png?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Limelight&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/swiftaw.css">
<style>
.nf-wrap {
  min-height: calc(100vh - 80px);
  display: flex; align-items: center;
  padding: 80px 0;
}
.nf-inner { max-width: 640px; }
.nf-code {
  font-size: .82rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: .2em;
  color: var(--text-muted);
  margin-bottom: 18px;
  display: flex; align-items: center; gap: 14px;
}
.nf-code::before {
  content: ''; width: 28px; height: 1px; background: var(--yellow);
}
.nf-inner h1 {
  font-size: clamp(1.8rem, 3.4vw, 2.6rem);
  font-weight: 600;
  letter-spacing: -.01em;
  margin-bottom: 18px;
}
.nf-inner p { color: var(--text-muted); font-size: 1.02rem; margin-bottom: 32px; max-width: 52ch; }
.nf-links { display: flex; gap: 12px; flex-wrap: wrap; }
</style>
</head>
<body>

<nav class="site-nav">
  <div class="nav-inner">
    <a href="/" class="nav-brand"><img src="/Swiftaw logomark.png" alt="Swiftaw"></a>
    <div class="nav-links" id="nav-links">
      <a href="/#about" class="nav-link">About</a>
      <a href="/#project" class="nav-link">Project</a>
      <a href="https://fortized.com" class="nav-link">Fortized</a>
    </div>
    <a href="https://fortized.com" class="nav-cta">Try Fortized</a>
    <button class="nav-toggle" id="nav-toggle" aria-label="Menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
  </div>
</nav>

<div class="container">
  <div class="nf-wrap">
    <div class="nf-inner">
      <div class="nf-code">Error 404 — Page not found</div>
      <h1>The page you requested could not be found.</h1>
      <p>The page may have moved, or the link may be incorrect. You can return to the homepage or open Fortized below.</p>
      <div class="nf-links">
        <a href="/" class="btn btn-primary">Return home</a>
        <a href="https://fortized.com" class="btn">Open Fortized</a>
      </div>
    </div>
  </div>
</div>

<script>document.getElementById('nav-toggle').addEventListener('click', () => { document.getElementById('nav-links').classList.toggle('open'); });</script>
</body>
</html>
