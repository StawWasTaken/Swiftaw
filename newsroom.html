<style>
.page-top { padding: 130px 0 44px; position: relative; }
.eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--font-display);
  font-size: 13px; font-weight: 700;
  color: var(--c-peach);
  background: rgba(253,186,116,.08);
  border: 1.5px solid rgba(253,186,116,.25);
  padding: 7px 14px; border-radius: 100px;
  margin-bottom: 22px;
  transform: rotate(-2deg);
}
.page-top h1 {
  font-family: var(--font-display);
  font-size: clamp(40px, 6.4vw, 88px);
  font-weight: 800;
  letter-spacing: -2.5px;
  line-height: .92;
  margin-bottom: 20px;
  max-width: 800px;
}
.page-top h1 .pop {
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  display: inline-block; transform: rotate(-2deg);
}
.page-top .lede { font-size: 18px; color: var(--text); max-width: 540px; line-height: 1.55; }

/* ───── Shell: sticky category rail + card grid ───── */
.news-wrap { padding: 0 28px; }
.news-shell {
  max-width: 1240px;
  margin: 36px auto 0;
  display: grid;
  grid-template-columns: 230px 1fr;
  gap: 30px;
}
@media (max-width: 880px) { .news-shell { grid-template-columns: 1fr; gap: 18px; } }

.news-cats {
  position: sticky; top: 100px; align-self: flex-start;
  display: flex; flex-direction: column; gap: 6px;
  padding: 18px;
  background: #0f1015;
  border: 1.5px solid rgba(255,255,255,.08);
  border-radius: 18px;
  box-shadow: 0 6px 0 0 #000;
  transform: rotate(.4deg);
}
@media (max-width: 880px) {
  .news-cats { position: static; flex-direction: row; flex-wrap: wrap; padding: 12px; transform: none; }
}
.news-cats-head {
  font-family: var(--font-display);
  font-size: 11px; font-weight: 800;
  letter-spacing: .16em; text-transform: uppercase;
  color: var(--muted-light,#8a8f9c);
  padding: 4px 10px 10px;
  border-bottom: 1px solid rgba(255,255,255,.08);
  margin-bottom: 4px;
}
@media (max-width: 880px) { .news-cats-head { display: none; } }
.news-cat {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  font-family: var(--font-display);
  font-size: 13px; font-weight: 700;
  color: var(--muted-light,#8a8f9c);
  padding: 9px 12px;
  border-radius: 10px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: color .15s, background .15s, border-color .15s;
  background: none;
  width: 100%;
  text-align: left;
}
.news-cat:hover { color: #fff; background: rgba(255,255,255,.04); }
.news-cat.active {
  color: #050608;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  box-shadow: 0 3px 0 0 #000;
}
.news-cat .count {
  font-family: var(--font-display);
  font-size: 11px; font-weight: 800;
  background: rgba(255,255,255,.08);
  padding: 2px 8px; border-radius: 100px;
  margin-left: auto;
}
.news-cat.active .count { background: rgba(0,0,0,.18); }

.news-main { min-width: 0; }
.news-controls { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
.news-cat-label { font-family: var(--font-display); font-size: 21px; font-weight: 800; letter-spacing: -.5px; }
.news-search { position: relative; flex: 1; max-width: 340px; min-width: 220px; }
.news-search svg { position: absolute; top: 50%; left: 14px; transform: translateY(-50%); width: 15px; height: 15px; fill: var(--muted-light,#8a8f9c); pointer-events: none; }
.news-search input {
  width: 100%; padding: 11px 14px 11px 38px;
  background: #12131a;
  border: 1.5px solid rgba(255,255,255,.08);
  border-radius: 12px;
  font-family: var(--font-body); font-size: 13.5px; color: #fff;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.news-search input::placeholder { color: var(--muted-light,#8a8f9c); }
.news-search input:focus { border-color: rgba(254,248,61,.45); box-shadow: 0 0 0 3px rgba(254,248,61,.10); }

.news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 18px; }
.news-card {
  position: relative;
  background: linear-gradient(160deg, #14151c 0%, #0e0f14 100%);
  border: 1.5px solid rgba(255,255,255,.08);
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
  display: flex; flex-direction: column;
  transition: transform .22s cubic-bezier(.22,1,.36,1), border-color .22s;
}
.news-card:nth-child(3n+1) { transform: rotate(-.5deg); }
.news-card:nth-child(3n+2) { transform: rotate(.5deg); }
.news-card:nth-child(3n) { transform: rotate(-.2deg); }
.news-card:hover { transform: rotate(0) translateY(-3px); border-color: rgba(254,248,61,.30); }
.news-card-img { height: 148px; background-size: cover; background-position: center; display:flex; align-items:center; justify-content:center; font-size: 42px; }
.news-card-body { padding: 17px 19px 19px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
.news-card-tag {
  align-self: flex-start;
  font-family: var(--font-display); font-size: 10.5px; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--accent);
  background: rgba(254,248,61,.08);
  border: 1px solid rgba(254,248,61,.22);
  padding: 4px 10px; border-radius: 100px;
}
.news-card-title { font-family: var(--font-display); font-size: 17px; font-weight: 800; letter-spacing: -.4px; line-height: 1.25; color: #fff; }
.news-card-excerpt { font-size: 12.5px; color: var(--muted-light,#8a8f9c); line-height: 1.5; }
.news-card-meta { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted-light,#8a8f9c); margin-top: auto; padding-top: 12px; border-top: 1px solid rgba(255,255,255,.05); }
.news-card-pfp {
  width: 22px; height: 22px; border-radius: 50%;
  background: linear-gradient(135deg, rgba(254,248,61,.30), rgba(254,248,61,.08));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: 10px; font-weight: 800;
  color: var(--accent); flex-shrink: 0;
}
.news-card-author { font-weight: 600; color: #fff; }
.news-card-dot { color: var(--muted-light,#8a8f9c); }
.news-card-readmore { font-family: var(--font-display); font-size: 12px; font-weight: 700; color: var(--accent); margin-left: auto; transition: transform .2s; }
.news-card:hover .news-card-readmore { transform: translateX(4px); }

.news-empty { text-align: center; padding: 60px 20px; font-size: 15px; color: var(--muted-light,#8a8f9c); grid-column: 1 / -1; }
.news-empty span { display: block; font-size: 38px; margin-bottom: 12px; }

/* ───── Article view ───── */
#article-view { display: none; max-width: 860px; margin: 0 auto; padding: 130px 28px 80px; }
#article-view.open { display: block; }
#news-list-view.hidden { display: none; }

.article-back {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--font-display); font-size: 13px; font-weight: 700;
  color: var(--muted-light,#8a8f9c);
  padding: 9px 14px; border-radius: 100px;
  border: 1px solid rgba(255,255,255,.08);
  background: rgba(255,255,255,.03);
  margin-bottom: 26px; cursor: pointer;
  transition: color .15s, border-color .15s, background .15s;
}
.article-back:hover { color: #fff; border-color: rgba(254,248,61,.30); background: rgba(254,248,61,.06); }

.article-banner-card {
  border-radius: 24px; overflow: hidden;
  border: 1.5px solid rgba(254,248,61,.22);
  background: #0f1015;
  margin-bottom: 24px;
  transform: rotate(.5deg);
  box-shadow: 0 8px 0 0 #000, 0 24px 60px rgba(0,0,0,.5);
}
.article-banner-img { width: 100%; height: 240px; background-size: cover; background-position: center; display:flex; align-items:center; justify-content:center; font-size: 64px; }
.article-banner-meta { padding: 26px 30px; }
.article-eyebrow {
  display: inline-flex; align-items: center; gap: 7px;
  font-family: var(--font-display); font-size: 10.5px; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--accent);
  background: rgba(254,248,61,.08);
  border: 1px solid rgba(254,248,61,.22);
  border-radius: 100px; padding: 5px 12px; margin-bottom: 14px;
}
.article-eyebrow::before { content:""; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
.article-full-title {
  font-family: var(--font-display);
  font-size: clamp(28px, 4vw, 42px); font-weight: 800;
  letter-spacing: -1.2px; line-height: 1.05; color: #fff;
  margin-bottom: 12px;
}
.article-full-meta { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; font-size: 12.5px; color: var(--muted-light,#8a8f9c); }

.article-byline {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 20px;
  background: #12131a;
  border: 1.5px solid rgba(255,255,255,.08);
  border-radius: 18px;
  margin-bottom: 34px;
  box-shadow: 0 5px 0 0 #000;
}
.byline-av {
  width: 46px; height: 46px; border-radius: 50%;
  background: linear-gradient(135deg, rgba(254,248,61,.30), rgba(254,248,61,.08));
  border: 2px solid rgba(254,248,61,.30);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: 16px; font-weight: 800;
  color: var(--accent); flex-shrink: 0;
}
.byline-info .byline-name { font-family: var(--font-display); font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 3px; letter-spacing: -.2px; }
.byline-info .byline-role { font-size: 12.5px; color: var(--muted-light,#8a8f9c); }
.byline-org { margin-left: auto; font-size: 11.5px; color: var(--muted-light,#8a8f9c); letter-spacing: .04em; }

.article-prose p { font-size: 15.5px; color: var(--text); line-height: 1.8; margin-bottom: 17px; }
.article-prose p.lead { font-size: 17px; color: #fff; line-height: 1.7; margin-bottom: 28px; padding-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,.08); font-weight: 500; }
.article-prose p b { color: #fff; font-weight: 600; }
.article-prose h3 {
  font-family: var(--font-display); font-size: 21px; font-weight: 800; letter-spacing: -.4px; color: #fff;
  margin: 34px 0 12px; display: flex; align-items: center; gap: 10px;
}
.article-prose h3::before { content:""; width: 5px; height: 20px; flex-shrink: 0; background: linear-gradient(180deg, var(--accent), var(--accent-2)); border-radius: 3px; }
.article-prose ul { list-style: none; margin: 12px 0 24px; display: flex; flex-direction: column; gap: 8px; }
.article-prose ul li { display: flex; align-items: flex-start; gap: 11px; font-size: 14.5px; color: var(--text); line-height: 1.6; padding: 12px 15px; background: rgba(255,255,255,.02); border: 1px solid rgba(255,255,255,.05); border-radius: 12px; }
.article-prose ul li::before { content: "✦"; color: var(--accent); font-size: 9px; flex-shrink: 0; margin-top: 5px; }
.article-prose ul li b { color: #fff; font-weight: 600; }
.article-prose .highlight-box {
  background: rgba(254,248,61,.05);
  border: 1px solid rgba(254,248,61,.20);
  border-left: 3px solid var(--accent);
  border-radius: 14px; padding: 18px 22px; margin: 24px 0;
  font-size: 14.5px; color: var(--text); line-height: 1.7;
  transform: rotate(-.4deg);
}
.article-prose .highlight-box strong { color: var(--accent); }
.article-prose .sign-off { color: var(--muted-light,#8a8f9c); font-size: 13.5px; font-style: italic; border-top: 1px solid rgba(255,255,255,.08); padding-top: 20px; margin-top: 8px; }
.article-prose .logo-chip { display: inline-flex; align-items: center; gap: 7px; background: #14151c; border: 1px solid rgba(255,255,255,.10); padding: 5px 12px 5px 8px; border-radius: 100px; font-size: 13px; font-weight: 500; color: #fff; margin: 3px 6px 3px 0; }
.article-prose .logo-chip img { width: 16px; height: 16px; border-radius: 4px; object-fit: contain; background:#fff; padding: 1px; }
</style>
</head>

<script>
const LOGO = {
  fortized: 'https://www.fortized.com/Fortized%20icon.png',
  discord: 'https://static.wikia.nocookie.net/dcpfr/images/0/09/Discordicon.png/revision/latest/scale-to-width-down/1000?cb=20230511153016&path-prefix=fr',
  roblox: 'https://upload.wikimedia.org/wikipedia/commons/7/70/Roblox_Corporation_2025_logo.svg'
};

const SW_ARTICLES = {
  soundboard_teaser: {
    category: 'Product', date: 'June 18, 2026', readTime: '2 min read', createdAt: new Date('2026-06-18').getTime(),
    icon: '🔊', bylineName: 'Tyrianum', bylineRole: 'Chief R&D Officer, Swiftaw', authorInitial: 'T',
    title: 'New in the Lab: a soundboard for voice chat',
    content: `<p class="lead">We just opened a new project on the bench — a lightweight soundboard panel built for voice calls, wherever they happen.</p><p>The idea is simple: a small grid of clips you can trigger with a hotkey, mixed straight into your mic. No alt-tabbing, no dead air while you look for the file.</p><h3>Where it's headed</h3><p>We're building it as a standalone tool first, one that routes into whatever you're already using to talk to people:</p><p>${['fortized','discord','roblox'].map(k=>`<span class="logo-chip"><img src="${LOGO[k]}" alt="">${k.charAt(0).toUpperCase()+k.slice(1)}</span>`).join('')}</p><div class="highlight-box"><strong>Fortized-native later.</strong> Once the mixing core is solid, it'll get a tighter, built-in version inside Fortized Party Rooms.</div><p>It's early — mixer routing is the hard part and we're not rushing it. You can follow progress on the <a href="/innovation-room" style="color:var(--accent);text-decoration:underline;">Lab page</a>.</p><p class="sign-off">— Tyrianum, Chief R&D Officer · Swiftaw</p>`
  },
  weaverdant_cco: {
    category: 'Team', date: 'February 14, 2026', readTime: '2 min read', createdAt: new Date('2026-02-14').getTime(),
    icon: '🧭', bylineName: 'Staw', bylineRole: 'Chief Executive Officer, Swiftaw', authorInitial: 'S',
    title: 'Weaverdant joins Swiftaw as Chief Community Officer',
    content: `<p class="lead">We're bringing on a dedicated voice for how Swiftaw talks about what it builds — and for how our communities get heard back.</p><p>Weaverdant joins Swiftaw as Chief Community Officer, moving from a background in community moderation and platform safety into a role built around one question: are the people using our products actually being listened to?</p><h3>What changes</h3><ul><li><b>A direct line from community to roadmap</b> — feedback from Fortized Bastions now has a clear owner inside the company.</li><li><b>Public-facing security and trust updates</b> — the kind of transparent reporting we think this space needs more of.</li><li><b>A steadier hand on how we communicate</b> — fewer silent changes, more explanations.</li></ul><div class="highlight-box"><strong>Why it matters.</strong> A two-person team can wing communication. A growing one can't. This is us growing up a little.</div><p class="sign-off">— Staw, Chief Executive Officer · Swiftaw</p>`
  },
  tyrianum_rd: {
    category: 'Team', date: 'December 3, 2025', readTime: '2 min read', createdAt: new Date('2025-12-03').getTime(),
    icon: '🧪', bylineName: 'Staw', bylineRole: 'Chief Executive Officer, Swiftaw', authorInitial: 'S',
    title: 'Tyrianum joins Swiftaw as Chief R&D Officer',
    content: `<p class="lead">Research and engineering get a dedicated home inside Swiftaw, and a person to run it who's spent years building things nobody asked for yet — until they did.</p><p>Tyrianum takes over as Chief R&D Officer, splitting time between shipping features on Fortized and running the Lab — our space for the ideas that aren't ready for a roadmap.</p><h3>The mandate</h3><ul><li><b>Ship what's ready.</b> Bastions 2.0, Living Bastions, and the Atelier economy all came out of this team.</li><li><b>Shelve what isn't.</b> Not every experiment needs to become a feature — some just need an honest write-up and a rest.</li><li><b>Say which is which, in public.</b> That's what the Lab is for.</li></ul><p class="sign-off">— Staw, Chief Executive Officer · Swiftaw</p>`
  },
  founding: {
    category: 'Milestone', date: 'August 11, 2025', readTime: '2 min read', createdAt: new Date('2025-08-11').getTime(),
    icon: '🏁', bylineName: 'Staw', bylineRole: 'Chief Executive Officer, Swiftaw', authorInitial: 'S',
    title: 'Swiftaw is founded',
    content: `<p class="lead">A European tech company begins. Fortized becomes the first product.</p><p>Swiftaw started as a conversation between friends frustrated with existing platforms — too many ads, too little sovereignty for the people actually running communities. We wanted to build something different, and we wanted to build it from Europe.</p><h3>The first bet</h3><p>Fortized was the first thing we built: a community platform where servers — we call them Bastions — are genuinely owned by the people who run them, and where status is earned through participation instead of bought with a card.</p><div class="highlight-box"><strong>Small on purpose.</strong> We're not chasing headcount. We're chasing a platform we'd actually want to use.</div><p class="sign-off">— Staw, Chief Executive Officer · Swiftaw</p>`
  }
};

function escAttr(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function getExcerpt(html){
  const tmp = document.createElement('div'); tmp.innerHTML = html;
  const lead = tmp.querySelector('.lead');
  const t = lead ? lead.textContent : tmp.textContent;
  return t.slice(0,120) + (t.length > 120 ? '…' : '');
}

let swActiveCategory = 'All';
let swSearch = '';

function getSwCategories(){
  const set = new Set(['All']);
  Object.values(SW_ARTICLES).forEach(a => set.add(a.category));
  return ['All', ...[...set].filter(c=>c!=='All').sort()];
}
function renderSwCats(){
  const cont = document.getElementById('news-cats');
  const counts = {};
  Object.values(SW_ARTICLES).forEach(a => { counts[a.category] = (counts[a.category]||0)+1; });
  const total = Object.values(SW_ARTICLES).length;
  cont.innerHTML = `<div class="news-cats-head">category</div>` + getSwCategories().map(c => {
    const count = c === 'All' ? total : (counts[c]||0);
    return `<a class="news-cat${c===swActiveCategory?' active':''}" data-cat="${escAttr(c)}">${escAttr(c)}<span class="count">${count}</span></a>`;
  }).join('');
  cont.querySelectorAll('.news-cat').forEach(el => el.addEventListener('click', () => {
    swActiveCategory = el.dataset.cat;
    document.getElementById('news-cat-label').textContent = swActiveCategory === 'All' ? 'All News' : swActiveCategory;
    renderSwCats(); renderSwGrid();
  }));
}

function buildSwCard(id, a){
  return `
    <article class="news-card" onclick="openSwArticle('${escAttr(id)}')">
      <div class="news-card-img">${a.icon||'📰'}</div>
      <div class="news-card-body">
        <div class="news-card-tag">${escAttr(a.category)}</div>
        <div class="news-card-title">${escAttr(a.title)}</div>
        <div class="news-card-excerpt">${getExcerpt(a.content)}</div>
        <div class="news-card-meta">
          <span class="news-card-pfp">${escAttr((a.bylineName||'?').charAt(0))}</span>
          <span class="news-card-author">${escAttr(a.bylineName)}</span>
          <span class="news-card-dot">·</span>
          <span>${escAttr(a.date)}</span>
          <span class="news-card-readmore">Read →</span>
        </div>
      </div>
    </article>`;
}

function renderSwGrid(){
  const grid = document.getElementById('news-grid');
  const q = swSearch.toLowerCase().trim();
  const entries = Object.entries(SW_ARTICLES)
    .filter(([id,a]) => swActiveCategory === 'All' || a.category === swActiveCategory)
    .filter(([id,a]) => !q || a.title.toLowerCase().includes(q) || a.bylineName.toLowerCase().includes(q) || a.category.toLowerCase().includes(q))
    .sort((a,b) => b[1].createdAt - a[1].createdAt);
  if (!entries.length){ grid.innerHTML = `<div class="news-empty"><span>🔍</span>No posts found.</div>`; return; }
  grid.innerHTML = entries.map(([id,a]) => buildSwCard(id,a)).join('');
}
function filterSwNews(v){ swSearch = v || ''; renderSwGrid(); }

function renderSwArticle(id){
  const a = SW_ARTICLES[id]; if (!a) return false;
  document.getElementById('article-content').innerHTML = `
    <div class="article-banner-card">
      <div class="article-banner-img">${a.icon||'📰'}</div>
      <div class="article-banner-meta">
        <div class="article-eyebrow">${escAttr(a.category)}</div>
        <div class="article-full-title">${escAttr(a.title)}</div>
        <div class="article-full-meta"><span>${escAttr(a.date)}</span><span>·</span><span>${escAttr(a.readTime)}</span></div>
      </div>
    </div>
    <div class="article-byline">
      <div class="byline-av">${escAttr(a.authorInitial)}</div>
      <div class="byline-info">
        <div class="byline-name">${escAttr(a.bylineName)}</div>
        <div class="byline-role">${escAttr(a.bylineRole)}</div>
      </div>
      <div class="byline-org">Swiftaw</div>
    </div>
    <div class="article-prose">${a.content}</div>
  `;
  document.title = `${a.title} - Swiftaw News`;
  document.getElementById('news-list-view').classList.add('hidden');
  document.getElementById('article-view').classList.add('open');
  return true;
}
function openSwArticle(id){
  if (!SW_ARTICLES[id]) return;
  const url = new URL(window.location.href);
  url.searchParams.set('article', id);
  history.pushState({articleId:id}, '', url.toString());
  renderSwArticle(id);
  window.scrollTo({top:0, behavior:'smooth'});
}
function closeSwArticle(){
  const url = new URL(window.location.href);
  url.searchParams.delete('article');
  history.pushState({articleId:null}, '', url.toString());
  document.getElementById('news-list-view').classList.remove('hidden');
  document.getElementById('article-view').classList.remove('open');
  document.title = 'News - Swiftaw';
  window.scrollTo({top:0, behavior:'smooth'});
}
window.addEventListener('popstate', e => {
  const id = e.state && e.state.articleId;
  if (id && SW_ARTICLES[id]) renderSwArticle(id);
  else {
    document.getElementById('news-list-view').classList.remove('hidden');
    document.getElementById('article-view').classList.remove('open');
    document.title = 'News - Swiftaw';
  }
  window.scrollTo({top:0, behavior:'smooth'});
});

renderSwCats();
renderSwGrid();
(function(){
  const params = new URLSearchParams(window.location.search);
  const id = params.get('article');
  if (id && SW_ARTICLES[id]) { renderSwArticle(id); history.replaceState({articleId:id}, '', window.location.href); }
})();
</script>
<script src="/css/swiftaw.js"></script>
</body>
