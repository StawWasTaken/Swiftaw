<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found - Fortized</title>
<meta name="description" content="This page doesn't exist on Fortized.">
<meta name="theme-color" content="#fff93e">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Fortized">
<meta property="og:title" content="Page Not Found – Fortized">
<meta property="og:description" content="This page doesn't exist on Fortized.">
<meta property="og:image" content="https://fortized.com/Fortized banner.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Page Not Found – Fortized">
<meta name="twitter:image" content="https://fortized.com/Fortized banner.png">
<link rel="icon" type="image/png" href="/Fortized icon.png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<style>
::selection{background:rgba(255,249,62,.2);}
:root{--accent:#fff93e;--accent-dim:rgba(255,249,62,.1);--accent-mid:rgba(255,249,62,.2);--accent-glow:rgba(255,249,62,.4);--bg:#060810;--panel:rgba(10,13,20,.82);--border:#151b2a;--border-hover:#1e2840;--radius:14px;--muted:#4a5568;--muted-light:#7d8a9e;--font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}img{-webkit-user-drag:none;user-select:none;}
html,body{height:100%;}
body{background:var(--bg);font-family:var(--font-body);color:white;overflow-x:hidden;display:flex;align-items:center;justify-content:center;}

/* ── Immersive background ── */
.bg-layer{position:fixed;inset:0;z-index:0;overflow:hidden;}
.bg-layer::before{content:"";position:absolute;inset:0;background:url("/Fortized banner.png") center/cover no-repeat;opacity:.06;filter:blur(2px) saturate(0.5);}
.bg-layer::after{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(255,249,62,.04),transparent 70%),radial-gradient(ellipse 60% 50% at 80% 20%,rgba(96,165,250,.03),transparent 60%),linear-gradient(180deg,rgba(6,8,16,0) 0%,rgba(6,8,16,.5) 60%,var(--bg) 100%);}

/* Grid overlay */
.bg-grid{position:fixed;inset:0;z-index:1;background-image:linear-gradient(rgba(255,249,62,.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,249,62,.012) 1px,transparent 1px);background-size:64px 64px;pointer-events:none;mask-image:radial-gradient(ellipse 70% 60% at 50% 40%,black 0%,transparent 100%);}

/* Floating particles */
.particles{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
.particle{position:absolute;border-radius:50%;opacity:0;animation:particleFloat linear infinite;}
.particle:nth-child(1){width:3px;height:3px;background:var(--accent);left:15%;top:80%;animation-duration:12s;animation-delay:0s;}
.particle:nth-child(2){width:2px;height:2px;background:rgba(255,249,62,.6);left:35%;top:90%;animation-duration:15s;animation-delay:2s;}
.particle:nth-child(3){width:4px;height:4px;background:rgba(255,249,62,.3);left:65%;top:85%;animation-duration:18s;animation-delay:4s;}
.particle:nth-child(4){width:2px;height:2px;background:rgba(96,165,250,.5);left:80%;top:95%;animation-duration:14s;animation-delay:1s;}
.particle:nth-child(5){width:3px;height:3px;background:rgba(255,249,62,.4);left:50%;top:88%;animation-duration:16s;animation-delay:3s;}
.particle:nth-child(6){width:2px;height:2px;background:rgba(62,207,110,.4);left:25%;top:92%;animation-duration:20s;animation-delay:5s;}
@keyframes particleFloat{0%{transform:translateY(0) translateX(0);opacity:0;}10%{opacity:1;}90%{opacity:1;}100%{transform:translateY(-100vh) translateX(20px);opacity:0;}}

/* Ambient glow orbs */
.glow-orb{position:fixed;border-radius:50%;pointer-events:none;filter:blur(80px);z-index:0;}
.glow-orb-1{width:400px;height:400px;background:rgba(255,249,62,.025);top:-10%;left:-5%;animation:orbFloat1 20s ease-in-out infinite;}
.glow-orb-2{width:350px;height:350px;background:rgba(96,165,250,.02);bottom:-10%;right:-5%;animation:orbFloat2 25s ease-in-out infinite;}
@keyframes orbFloat1{0%,100%{transform:translate(0,0);}50%{transform:translate(60px,40px);}}
@keyframes orbFloat2{0%,100%{transform:translate(0,0);}50%{transform:translate(-50px,-30px);}}

/* ── Main layout ── */
.error-container{position:relative;z-index:10;width:100%;max-width:520px;padding:24px;display:flex;flex-direction:column;align-items:center;}

/* Branding */
.error-brand{display:flex;flex-direction:column;align-items:center;gap:16px;margin-bottom:36px;animation:fadeDown .6s cubic-bezier(.22,1,.36,1) both;}
.error-brand-logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
.error-brand-logo img{height:40px;width:40px;object-fit:contain;filter:drop-shadow(0 0 20px rgba(255,249,62,.2));}
.error-brand-logo span{font-family:var(--font-display);font-size:22px;font-weight:800;color:#fff;letter-spacing:-.5px;}

/* Card */
.error-card{width:100%;background:var(--panel);border-radius:20px;border:1px solid var(--border);backdrop-filter:blur(40px) saturate(1.3);box-shadow:0 30px 80px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.03) inset,0 1px 0 rgba(255,255,255,.04) inset;overflow:hidden;animation:revealUp .5s cubic-bezier(.22,1,.36,1) .1s both;position:relative;}
.error-card::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 5%,rgba(255,249,62,.3) 50%,transparent 95%);}
@keyframes revealUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-12px);}to{opacity:1;transform:translateY(0);}}

.error-card-body{padding:48px 40px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:24px;}

/* 404 code */
.error-code{font-family:var(--font-display);font-size:96px;font-weight:800;letter-spacing:-4px;line-height:1;color:var(--accent);text-shadow:0 0 60px rgba(255,249,62,.2),0 0 120px rgba(255,249,62,.1);animation:glowPulse 3s ease-in-out infinite;}
@keyframes glowPulse{0%,100%{text-shadow:0 0 60px rgba(255,249,62,.2),0 0 120px rgba(255,249,62,.1);}50%{text-shadow:0 0 80px rgba(255,249,62,.35),0 0 160px rgba(255,249,62,.15);}}

.error-title{font-family:var(--font-display);font-size:22px;font-weight:700;color:#fff;letter-spacing:-.3px;}
.error-desc{font-size:14px;color:var(--muted-light);line-height:1.6;max-width:360px;}
.error-path{display:inline-block;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:6px 14px;font-family:'DM Sans',monospace;font-size:12.5px;color:var(--muted-light);word-break:break-all;max-width:100%;}

/* Buttons */
.error-actions{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;justify-content:center;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:12px;font-family:var(--font-body);font-size:14px;font-weight:600;text-decoration:none;cursor:pointer;border:none;transition:all .2s cubic-bezier(.22,1,.36,1);}
.btn-primary{background:var(--accent);color:#0a0c14;box-shadow:0 0 20px rgba(255,249,62,.15);}
.btn-primary:hover{background:#fffb6b;transform:translateY(-1px);box-shadow:0 0 30px rgba(255,249,62,.25);}
.btn-ghost{background:rgba(255,255,255,.04);color:#fff;border:1px solid var(--border);}
.btn-ghost:hover{background:rgba(255,255,255,.08);border-color:var(--border-hover);transform:translateY(-1px);}
.btn svg{width:16px;height:16px;}

/* Footer */
.error-footer{margin-top:28px;text-align:center;animation:fadeDown .6s cubic-bezier(.22,1,.36,1) .3s both;}
.error-footer p{font-size:12.5px;color:var(--muted);}
.error-footer a{color:var(--accent);text-decoration:none;font-weight:500;}
.error-footer a:hover{text-decoration:underline;}

@media(max-width:520px){
  .error-card-body{padding:36px 24px;}
  .error-code{font-size:72px;}
  .error-title{font-size:18px;}
  .error-actions{flex-direction:column;width:100%;}
  .btn{justify-content:center;width:100%;}
}
</style>
</head>
<body>

<!-- Immersive background -->
<div class="bg-layer"></div>
<div class="bg-grid"></div>
<div class="particles">
  <div class="particle"></div><div class="particle"></div><div class="particle"></div>
  <div class="particle"></div><div class="particle"></div><div class="particle"></div>
</div>
<div class="glow-orb glow-orb-1"></div>
<div class="glow-orb glow-orb-2"></div>

<div class="error-container">
  <!-- Branding -->
  <div class="error-brand">
    <a href="/" class="error-brand-logo">
      <img src="/Fortized icon.png" alt="Fortized">
      <span>Fortized</span>
    </a>
  </div>

  <!-- Card -->
  <div class="error-card">
    <div class="error-card-body">
      <div class="error-code">404</div>
      <div class="error-title">Page not found</div>
      <div class="error-desc">
        The page you're looking for doesn't exist or has been moved.
      </div>
      <div class="error-path" id="error-path"></div>
      <div class="error-actions">
        <a href="/" class="btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Go home
        </a>
        <a href="/app" class="btn btn-ghost">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Open app
        </a>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="error-footer">
    <p>Lost? <a href="/support">Contact support</a> &middot; <a href="/legal">Legal</a></p>
  </div>
</div>

<script>
  // Show the attempted path
  var pathEl = document.getElementById('error-path');
  if (pathEl) pathEl.textContent = window.location.pathname;
</script>
</body>
</html>
