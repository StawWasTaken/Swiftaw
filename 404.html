<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found · Swiftaw</title>
<meta name="description" content="The page you were looking for doesn't exist.">
<link rel="icon" type="image/png" href="/SwiftawFavicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Limelight&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/swiftaw.css">
<style>
.nf-wrap {
  min-height: calc(100vh - 80px);
  display: flex; align-items: center; justify-content: center;
  padding: 60px 20px; text-align: center;
  position: relative; overflow: hidden;
}
.nf-wrap::before {
  content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 600px 400px at 50% 20%, rgba(255,249,62,.1), transparent 55%),
    radial-gradient(ellipse 600px 400px at 50% 80%, rgba(255,156,60,.08), transparent 55%);
}
.nf-inner { position: relative; z-index: 1; max-width: 540px; }
.nf-code {
  font-family: var(--font-display);
  font-size: clamp(6rem, 16vw, 11rem);
  line-height: .9;
  background: var(--grad);
  -webkit-background-clip: text; background-clip: text; color: transparent;
  margin-bottom: 12px;
}
.nf-inner h1 { font-family: var(--font-display); font-size: clamp(1.8rem, 4vw, 2.6rem); margin-bottom: 14px; }
.nf-inner p { color: var(--text-muted); font-size: 1.04rem; margin-bottom: 28px; }
.nf-links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
</style>
</head>
<body>

<nav class="site-nav">
  <div class="nav-inner">
    <a href="/" class="nav-brand"><img src="/Swiftaw logomark.png" alt="Swiftaw"></a>
    <div class="nav-links" id="nav-links">
      <a href="/company/about" class="nav-link">About</a>
      <a href="/blog" class="nav-link">Blog</a>
      <a href="/documents" class="nav-link">Documents</a>
    </div>
    <a href="https://fortized.swiftaw.com" class="nav-cta">Try Fortized</a>
    <button class="nav-toggle" id="nav-toggle" aria-label="Menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
  </div>
</nav>

<div class="nf-wrap">
  <div class="nf-inner">
    <div class="nf-code">404</div>
    <h1>We couldn't find that page.</h1>
    <p>The page may have moved, or it was never here to begin with. Try one of these instead:</p>
    <div class="nf-links">
      <a href="/" class="btn btn-primary">Back to home</a>
      <a href="/blog" class="btn btn-ghost">Read the journal</a>
      <a href="/documents" class="btn btn-ghost">Browse docs</a>
    </div>
  </div>
</div>

<script src="/js/swiftaw-auth.js"></script>
<script src="/js/swiftaw-nav.js"></script>
<script>document.getElementById('nav-toggle').addEventListener('click', () => { document.getElementById('nav-links').classList.toggle('open'); });</script>
</body>
</html>
