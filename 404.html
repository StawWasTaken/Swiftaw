<style>
.four-wrap {

.four-spotlight {

}
.four-inner { position: relative; z-index: 1; max-width: 540px; }
.four-num {
  font-family: var(--font-display);
  font-size: clamp(120px, 22vw, 220px); font-weight: 800; line-height: 1;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 14px; letter-spacing: -8px;
  filter: drop-shadow(0 0 32px rgba(254,248,61,.25));
}
.four-inner h1 {
  font-family: var(--font-display);
  font-size: 32px; font-weight: 800; letter-spacing: -.8px;
  margin-bottom: 14px;
}
.four-inner p { font-size: 16px; color: var(--muted-light); margin-bottom: 28px; line-height: 1.65; }
.four-actions { display: inline-flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
