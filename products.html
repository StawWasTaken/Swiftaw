<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products - Swiftaw</title>
<meta name="description" content="Products from Swiftaw - Swiftly Beyond.">
<link rel="icon" type="image/png" href="/SwiftawFavicon.png?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black: #000000;
  --bg: #0a0a0a;
  --gray: #1a1a1a;
  --border: #1f2228;
  --white: #ffffff;
  --text: rgba(255,255,255,0.8);
  --text-muted: rgba(255,255,255,0.5);
  --font: 'Syne', sans-serif;
}

::selection { background: var(--white); color: var(--black); }
html { scroll-behavior: smooth; }
body { background: var(--black); color: var(--text); font-family: var(--font); font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
a { color: inherit; text-decoration: none; }
img { max-width: 100%; display: block; }

::-webkit-scrollbar { width: 1px; }
::-webkit-scrollbar-track { background: var(--black); }
::-webkit-scrollbar-thumb { background: var(--text-muted); }

/* Nav */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.nav-inner {
  max-width: 1200px; margin: 0 auto; padding: 0 32px;
  height: 56px; display: flex; align-items: center; justify-content: space-between;
}
.nav-brand img { height: 32px; }
.nav-links { display: flex; gap: 32px; }
.nav-links a {
  font-size: 13px; font-weight: 500; color: var(--text-muted);
  transition: color 0.2s;
}
.nav-links a:hover { color: var(--white); }
.nav-cta {
  font-size: 12px; font-weight: 700;
  background: var(--white); color: var(--black);
  padding: 8px 20px; transition: opacity 0.2s;
}
.nav-cta:hover { opacity: 0.85; }
@media (max-width: 768px) { .nav-links { display: none; } }

/* Page */
.page { padding: 120px 32px 80px; }
.container { max-width: 1200px; margin: 0 auto; }
.page-title {
  font-size: clamp(2rem, 4vw, 3rem); font-weight: 800;
  margin-bottom: 48px;
}

/* Product Banner - Tesla Style */
.product-hero {
  position: relative; min-height: 70vh;
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 48px; margin-bottom: 80px;
  background: var(--gray);
  border-radius: 4px; overflow: hidden;
}
.product-hero-bg {
  position: absolute; inset: 0;
  background: url('https://www.fortized.com/Fortized%20banner5.png') center/cover no-repeat;
  opacity: 0.6;
}
.product-hero-bg::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to top, var(--black), transparent 60%);
}
.product-hero-content {
  position: relative; z-index: 1;
}
.product-badge {
  display: inline-block; font-size: 11px; font-weight: 700;
  letter-spacing: 0.1em; color: var(--text-muted);
  padding: 6px 12px; background: var(--black);
  border-radius: 2px; margin-bottom: 16px;
}
.product-hero h2 {
  font-size: clamp(2rem, 4vw, 3rem); font-weight: 800;
  margin-bottom: 12px;
}
.product-hero p {
  font-size: 14px; color: var(--text-muted);
  max-width: 400px; margin-bottom: 24px;
}
.product-hero-cta {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 13px; font-weight: 700;
  background: var(--white); color: var(--black);
  padding: 12px 28px; transition: opacity 0.2s;
}
.product-hero-cta:hover { opacity: 0.85; }

/* Other products */
.products-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 24px;
}
@media (max-width: 768px) { .products-grid { grid-template-columns: 1fr; } }

.product-card {
  background: var(--gray); border-radius: 4px; padding: 32px;
  min-height: 300px; display: flex; flex-direction: column; justify-content: space-between;
}
.product-card.coming { opacity: 0.5; }
.product-card h3 {
  font-size: 24px; font-weight: 800; margin-bottom: 8px;
}
.product-card p {
  font-size: 13px; color: var(--text-muted);
}
.product-card-link {
  margin-top: 24px; font-size: 13px; font-weight: 700;
  color: var(--white); display: inline-flex; align-items: center; gap: 8px;
}
.product-card-link:hover { opacity: 0.7; }
.product-status {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.1em; color: var(--text-muted);
}

/* Footer */
.footer {
  padding: 40px 32px; border-top: 1px solid var(--border);
  text-align: center;
}
.footer-brand img { height: 20px; margin: 0 auto 16px; opacity: 0.6; }
.footer-links {
  display: flex; gap: 24px; justify-content: center; margin: 24px 0;
}
.footer-links a { font-size: 12px; color: var(--text-muted); }
.footer-links a:hover { color: var(--white); }
.footer-copy {
  font-size: 11px; color: var(--text-muted);
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-brand"><img src="/SWFTW_Logomark_white.png" alt="Swiftaw"></a>
    <div class="nav-links">
      <a href="/about-us">About</a>
      <a href="/products">Products</a>
    </div>
    <a href="https://fortized.com" class="nav-cta">Fortized</a>
  </div>
</nav>

<section class="page">
  <div class="container">
    <h1 class="page-title">Our Products</h1>

    <!-- Fortized - Main Product -->
    <div class="product-hero">
      <div class="product-hero-bg"></div>
      <div class="product-hero-content">
        <div class="product-badge">LIVE</div>
        <h2>Fortized</h2>
        <p>A modern, gaming-oriented community platform built for players and their communities.</p>
        <a href="https://fortized.com" class="product-hero-cta">Explore Fortized</a>
      </div>
    </div>

    <!-- Other Products -->
    <div class="products-grid">
      <div class="product-card">
        <div>
          <div class="product-status">MORE SOON</div>
          <h3>More coming</h3>
          <p>Stay tuned for what's next.</p>
        </div>
      </div>
    </div>
  </div>
</section>

<footer class="footer">
  <div class="footer-brand">
    <img src="/SWFTW_Logomark_white.png" alt="Swiftaw">
  </div>
  <div class="footer-links">
    <a href="/">Home</a>
    <a href="/about-us">About</a>
    <a href="/products">Products</a>
    <a href="https://fortized.com">Fortized</a>
  </div>
  <div class="footer-copy">
    © 2026 Swiftaw
  </div>
</footer>

</body>
</html>
