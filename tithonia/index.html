<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tithonia</title>
<meta name="description" content="Tithonia - the AI-powered assistant by Swiftaw. Smart, modern, built for you.">
<meta name="theme-color" content="#0a0a0a">
<link rel="icon" type="image/png" href="/product-logos/Tithonia icon.png">
<link href="https://fonts.cdnfonts.com/css/afronaut-test" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
<script src="/AI-Models/Sprout/supabase-config.js"></script>
<script src="/AI-Models/Sprout/smart-search.js"></script>
<script src="/AI-Models/Sprout/sprout-engine.js"></script>
<style>
/* ── Variables ── */
:root {
  --brand-deep: #241f3c;
  --brand-yellow: #fff93e;
  --brand-orange: #ff9c3c;
  --bg-dark: #0a0a0a;
  --bg-sidebar: #111111;
  --bg-chat: #0a0a0a;
  --bg-input: #1a1a1a;
  --bg-hover: #1a1a1a;
  --bg-user-msg: #1e1b2e;
  --bg-ai-msg: transparent;
  --border-color: rgba(255,255,255,.06);
  --text-primary: #f0f0f0;
  --text-secondary: rgba(255,255,255,.5);
  --text-muted: rgba(255,255,255,.3);
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-serif: 'Newsreader', Georgia, serif;
  --font-display: 'Afronaut Test', 'Newsreader', sans-serif;
  --sidebar-w: 280px;
  --input-max-w: 768px;
}

::selection { background: rgba(255,249,62,.2); }

/* ── Reset ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  background: var(--bg-dark);
  color: var(--text-primary);
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
a { text-decoration: none; color: inherit; }
button { border: none; background: none; cursor: pointer; font-family: inherit; color: inherit; }
input, textarea { font-family: inherit; }

/* ── Layout ── */
.app {
  display: flex;
  height: 100vh;
  width: 100vw;
}

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  transition: transform .25s cubic-bezier(.4,0,.2,1), opacity .25s;
  z-index: 100;
}

.sidebar-header {
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-color);
}

.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.sidebar-brand img {
  height: 28px;
}

.sidebar-brand span {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
  letter-spacing: .02em;
}

.btn-new-chat {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 12px 14px;
  margin: 12px 12px 4px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  border: 1px solid var(--border-color);
  transition: background .15s, border-color .15s;
  color: var(--text-primary);
}

.btn-new-chat:hover {
  background: var(--bg-hover);
  border-color: rgba(255,255,255,.12);
}

.btn-new-chat svg {
  width: 18px;
  height: 18px;
  opacity: .7;
}

.sidebar-section-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--text-muted);
  padding: 20px 16px 8px;
}

.chat-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 8px;
}

.chat-list::-webkit-scrollbar { width: 4px; }
.chat-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 4px; }

.chat-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 13.5px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: background .12s, color .12s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.chat-item:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.chat-item.active {
  background: rgba(255,255,255,.08);
  color: var(--text-primary);
}

.chat-item svg {
  width: 16px;
  height: 16px;
  min-width: 16px;
  opacity: .4;
}

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border-color);
}

.sidebar-footer a {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  transition: color .15s;
}

.sidebar-footer a:hover {
  color: var(--text-secondary);
}

/* ── Mobile sidebar toggle ── */
.sidebar-toggle {
  display: none;
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 200;
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: var(--bg-sidebar);
  border: 1px solid var(--border-color);
  align-items: center;
  justify-content: center;
}

.sidebar-toggle svg {
  width: 20px;
  height: 20px;
  opacity: .7;
}

.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 90;
}

/* ── Main chat area ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  position: relative;
}

/* Top bar */
.topbar {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border-color);
  min-height: 56px;
}

.topbar-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
}

/* ── Messages ── */
.messages-wrap {
  flex: 1;
  overflow-y: auto;
  scroll-behavior: smooth;
}

.messages-wrap::-webkit-scrollbar { width: 6px; }
.messages-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 6px; }

.messages {
  max-width: var(--input-max-w);
  margin: 0 auto;
  padding: 24px 24px 140px;
}

/* ── Landing state ── */
.landing {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px 160px;
  text-align: center;
}

.landing-logo {
  width: 72px;
  height: 72px;
  object-fit: contain;
  margin-bottom: 24px;
  opacity: .9;
}

.landing h1 {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 600;
  letter-spacing: .01em;
  margin-bottom: 12px;
  background: linear-gradient(135deg, var(--text-primary), var(--brand-orange));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.landing p {
  font-size: 15px;
  line-height: 1.6;
  color: var(--text-secondary);
  max-width: 460px;
  margin-bottom: 40px;
}

.suggestions {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  max-width: 520px;
  width: 100%;
}

.suggestion-card {
  padding: 16px 18px;
  border: 1px solid var(--border-color);
  border-radius: 12px;
  text-align: left;
  font-size: 13.5px;
  line-height: 1.5;
  color: var(--text-secondary);
  transition: background .15s, border-color .15s, color .15s;
  cursor: pointer;
}

.suggestion-card:hover {
  background: var(--bg-hover);
  border-color: rgba(255,255,255,.12);
  color: var(--text-primary);
}

.suggestion-card .suggestion-icon {
  font-size: 18px;
  margin-bottom: 8px;
  display: block;
}

/* ── Message bubbles ── */
.message {
  display: flex;
  gap: 14px;
  margin-bottom: 24px;
  animation: msgIn .3s ease;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.message-avatar {
  width: 32px;
  height: 32px;
  min-width: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  margin-top: 2px;
}

.message-avatar.user-avatar {
  background: var(--brand-deep);
  color: var(--brand-yellow);
}

.message-avatar.ai-avatar {
  background: transparent;
  padding: 0;
  overflow: hidden;
}

.message-avatar.ai-avatar img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.message-content {
  flex: 1;
  min-width: 0;
}

.message-sender {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--text-primary);
}

.message-text {
  font-size: 14.5px;
  line-height: 1.7;
  color: rgba(255,255,255,.82);
}

.message-text p + p {
  margin-top: 12px;
}

/* ── Markdown rendered content ── */
.message-text h1, .message-text h2, .message-text h3, .message-text h4 {
  color: var(--text-primary);
  margin: 16px 0 8px;
  line-height: 1.3;
}
.message-text h1 { font-size: 1.4em; }
.message-text h2 { font-size: 1.2em; }
.message-text h3 { font-size: 1.05em; }
.message-text ul, .message-text ol {
  margin: 8px 0;
  padding-left: 24px;
}
.message-text li { margin: 4px 0; }
.message-text pre {
  background: #111;
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 8px;
  padding: 14px 16px;
  overflow-x: auto;
  margin: 12px 0;
  font-size: 13px;
  line-height: 1.5;
}
.message-text pre code {
  background: none;
  padding: 0;
  border-radius: 0;
  font-size: inherit;
  color: #e6e6e6;
}
.message-text code {
  background: rgba(255,255,255,.08);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 13px;
  font-family: 'SFMono-Regular', 'Fira Code', 'Consolas', monospace;
  color: #e6e6e6;
}
.message-text blockquote {
  border-left: 3px solid var(--brand-yellow);
  padding: 4px 12px;
  margin: 12px 0;
  color: rgba(255,255,255,.65);
  font-style: italic;
}
.message-text table {
  border-collapse: collapse;
  margin: 12px 0;
  width: 100%;
}
.message-text th, .message-text td {
  border: 1px solid rgba(255,255,255,.1);
  padding: 8px 12px;
  text-align: left;
  font-size: 13.5px;
}
.message-text th {
  background: rgba(255,255,255,.04);
  font-weight: 600;
}
.message-text strong { color: var(--text-primary); }
.message-text hr { border: none; border-top: 1px solid rgba(255,255,255,.08); margin: 16px 0; }

/* Emotional mood indicator */
.mood-indicator {
  display: inline-block;
  font-size: 11px;
  font-weight: 500;
  padding: 1px 8px;
  border-radius: 10px;
  margin-left: 8px;
  vertical-align: middle;
  opacity: 0.7;
  letter-spacing: 0.3px;
}
.mood-happy { background: rgba(255,249,62,.12); color: #fff93e; }
.mood-sad { background: rgba(100,149,237,.12); color: #6495ed; }
.mood-angry { background: rgba(255,99,71,.12); color: #ff6347; }
.mood-curious { background: rgba(138,43,226,.12); color: #ba8ef7; }
.mood-greeting { background: rgba(255,156,60,.12); color: #ff9c3c; }
.mood-grateful { background: rgba(255,182,193,.12); color: #ffb6c1; }
.mood-playful { background: rgba(0,206,209,.12); color: #00ced1; }
.mood-confused { background: rgba(255,165,0,.12); color: #ffa500; }
.mood-farewell { background: rgba(147,112,219,.12); color: #9370db; }
.mode-indicator {
  display: inline-block;
  font-size: 10px;
  font-weight: 400;
  padding: 1px 6px;
  border-radius: 8px;
  margin-left: 6px;
  vertical-align: middle;
  opacity: 0.5;
  letter-spacing: 0.2px;
  background: rgba(255,255,255,.06);
  color: rgba(255,255,255,.4);
  font-style: italic;
}
.mood-neutral { background: rgba(255,255,255,.06); color: rgba(255,255,255,.4); }

/* Typing indicator */
.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 4px 0;
}

.typing-indicator span {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--brand-orange);
  opacity: .4;
  animation: typingDot 1.4s ease-in-out infinite;
}

.typing-indicator span:nth-child(2) { animation-delay: .2s; }
.typing-indicator span:nth-child(3) { animation-delay: .4s; }

@keyframes typingDot {
  0%, 60%, 100% { opacity: .4; transform: scale(1); }
  30% { opacity: 1; transform: scale(1.2); }
}

/* ── Input bar ── */
.input-bar-wrap {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 0 24px 24px;
  background: linear-gradient(transparent, var(--bg-dark) 40%);
  pointer-events: none;
}

.input-bar {
  max-width: var(--input-max-w);
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  background: var(--bg-input);
  border: 1px solid var(--border-color);
  border-radius: 16px;
  padding: 0;
  transition: border-color .2s, box-shadow .2s;
  pointer-events: all;
}

.input-bar:focus-within {
  border-color: rgba(255,156,60,.3);
  box-shadow: 0 0 0 3px rgba(255,156,60,.06);
}

/* File preview area */
.file-preview-area {
  display: none;
  padding: 8px 14px 0;
  gap: 8px;
  flex-wrap: wrap;
}

.file-preview-area.has-files {
  display: flex;
}

.file-preview-item {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 10px;
  padding: 6px 10px;
  font-size: 12px;
  color: var(--text-secondary);
  max-width: 200px;
  animation: msgIn .2s ease;
}

.file-preview-item .file-icon {
  font-size: 14px;
  min-width: 16px;
  text-align: center;
}

.file-preview-item .file-name {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
}

.file-preview-item .file-remove {
  width: 16px;
  height: 16px;
  min-width: 16px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,.1);
  cursor: pointer;
  transition: background .15s;
  color: var(--text-muted);
  font-size: 10px;
  line-height: 1;
}

.file-preview-item .file-remove:hover {
  background: rgba(255,80,80,.3);
  color: #ff6b6b;
}

.file-preview-thumb {
  width: 32px;
  height: 32px;
  border-radius: 6px;
  object-fit: cover;
}

/* Text input row */
.input-row {
  display: flex;
  align-items: flex-end;
  gap: 0;
  padding: 6px 6px 6px 18px;
}

.input-bar textarea {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text-primary);
  font-size: 14.5px;
  line-height: 1.5;
  padding: 10px 0;
  resize: none;
  max-height: 150px;
  min-height: 22px;
}

.input-bar textarea::placeholder {
  color: var(--text-muted);
}

.btn-send {
  width: 40px;
  height: 40px;
  min-width: 40px;
  border-radius: 12px;
  background: var(--brand-orange);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s, transform .1s, opacity .15s;
  opacity: .4;
}

.btn-send.active {
  opacity: 1;
}

.btn-send.active:hover {
  background: #ffab55;
  transform: scale(1.04);
}

.btn-send svg {
  width: 18px;
  height: 18px;
  color: var(--bg-dark);
}

/* Bottom toolbar row */
.input-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 8px 6px;
  border-top: 1px solid rgba(255,255,255,.04);
}

.input-toolbar-left {
  display: flex;
  align-items: center;
  gap: 2px;
}

.input-toolbar-right {
  display: flex;
  align-items: center;
  gap: 2px;
}

/* Attach button */
.btn-attach {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s, color .15s;
  color: var(--text-muted);
}

.btn-attach:hover {
  background: rgba(255,255,255,.08);
  color: var(--text-secondary);
}

.btn-attach svg {
  width: 18px;
  height: 18px;
}

/* Inline model selector */
.input-model-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  padding: 5px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: background .15s, color .15s;
  user-select: none;
}

.input-model-btn:hover {
  background: rgba(255,255,255,.06);
  color: var(--text-secondary);
}

.input-model-btn .dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #4ade80;
}

.input-model-btn .chevron {
  width: 12px;
  height: 12px;
  opacity: .4;
  transition: transform .2s;
}

.model-selector.open .input-model-btn .chevron {
  transform: rotate(180deg);
}

.input-disclaimer {
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 8px;
  pointer-events: all;
}

/* File analysis message styles */
.file-attachment-preview {
  margin-top: 8px;
  padding: 8px 12px;
  background: rgba(255,255,255,.04);
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,.06);
}

.file-attachment-preview img {
  max-width: 280px;
  max-height: 200px;
  border-radius: 6px;
  margin-top: 6px;
  display: block;
}

.file-attachment-preview .file-text-preview {
  font-size: 12px;
  color: var(--text-muted);
  max-height: 80px;
  overflow: hidden;
  white-space: pre-wrap;
  margin-top: 6px;
  font-family: monospace;
}

.file-attachment-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 4px;
}

/* ── Model Selector ── */
.model-selector {
  position: relative;
}

.model-dropdown {
  position: absolute;
  bottom: calc(100% + 6px);
  right: 0;
  min-width: 280px;
  background: #1a1a1a;
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 12px;
  padding: 6px;
  z-index: 500;
  opacity: 0;
  visibility: hidden;
  transform: translateY(4px);
  transition: opacity .15s, visibility .15s, transform .15s;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
}

.model-selector.open .model-dropdown {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

.model-option {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  width: 100%;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: background .12s;
  text-align: left;
}

.model-option:hover {
  background: rgba(255,255,255,.06);
}

.model-option.active {
  background: rgba(255,255,255,.08);
}

.model-option-check {
  width: 18px;
  height: 18px;
  min-width: 18px;
  margin-top: 1px;
  opacity: 0;
  color: var(--brand-orange);
}

.model-option.active .model-option-check {
  opacity: 1;
}

.model-option-info {
  flex: 1;
  min-width: 0;
}

.model-option-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 2px;
}

.model-option-desc {
  font-size: 11.5px;
  color: var(--text-secondary);
  line-height: 1.4;
}

.model-dropdown-divider {
  height: 1px;
  background: rgba(255,255,255,.06);
  margin: 4px 0;
}

/* ── Train Button ── */
.btn-train {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  border-radius: 8px;
  border: 1px solid var(--border-color);
  transition: background .15s, color .15s, border-color .15s;
  margin: 8px 12px;
}

.btn-train:hover {
  background: rgba(74,222,128,.06);
  border-color: rgba(74,222,128,.15);
  color: rgba(74,222,128,.8);
}

.btn-train svg {
  width: 14px;
  height: 14px;
  opacity: .6;
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    transform: translateX(-100%);
    opacity: 0;
  }

  .sidebar.open {
    transform: translateX(0);
    opacity: 1;
  }

  .sidebar-overlay.open {
    display: block;
  }

  .sidebar-toggle {
    display: flex;
  }

  .suggestions {
    grid-template-columns: 1fr;
  }

  .landing h1 {
    font-size: 26px;
  }

  .messages {
    padding: 16px 16px 140px;
  }

  .input-bar-wrap {
    padding: 0 12px 16px;
  }
}

@media (max-width: 480px) {
  .landing-logo {
    width: 56px;
    height: 56px;
  }

  .landing h1 {
    font-size: 22px;
  }

  .landing p {
    font-size: 14px;
  }
}
</style>
</head>
<body>

<div class="app">
  <!-- Mobile sidebar toggle -->
  <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

  <!-- Mobile overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <img src="/product-logos/Tithonia icon.png" alt="Tithonia">
        <span>Tithonia</span>
      </div>
    </div>

    <button class="btn-new-chat" id="btnNewChat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      New chat
    </button>

    <div class="sidebar-section-label">Recent</div>

    <div class="chat-list" id="chatList">
      <!-- Populated by JS -->
    </div>

    <a class="btn-train" href="/AI-Models/Sprout/training.html" title="Researcher access required">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
      Train Tithonia
    </a>

    <div class="sidebar-footer">
      <a href="/">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back to Swiftaw
      </a>
    </div>
  </aside>

  <!-- Main area -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbarTitle">New chat</div>
    </div>

    <!-- Landing state -->
    <div class="landing" id="landing">
      <img class="landing-logo" src="/product-logos/tithonia logomark.png" alt="Tithonia">
      <h1>What can I help with?</h1>
      <p id="landingDesc">A modern AI assistant powered by the Tithonia engine — built for daily help, smart project planning, quick answers, and specialized insights.</p>
      <div class="suggestions" id="suggestions">
        <button class="suggestion-card" data-prompt="Help me brainstorm ideas for a creative project">
          <span class="suggestion-icon">&#9889;</span>
          Help me brainstorm ideas for a creative project
        </button>
        <button class="suggestion-card" data-prompt="Explain quantum computing in simple terms">
          <span class="suggestion-icon">&#128218;</span>
          Explain quantum computing in simple terms
        </button>
        <button class="suggestion-card" data-prompt="Write a professional email to request time off">
          <span class="suggestion-icon">&#9997;&#65039;</span>
          Write a professional email to request time off
        </button>
        <button class="suggestion-card" data-prompt="Compare pros and cons of remote work vs office work">
          <span class="suggestion-icon">&#128161;</span>
          Compare pros and cons of remote vs office work
        </button>
      </div>
    </div>

    <!-- Messages area (hidden initially) -->
    <div class="messages-wrap" id="messagesWrap" style="display:none;">
      <div class="messages" id="messages"></div>
    </div>

    <!-- Input bar -->
    <div class="input-bar-wrap">
      <div class="input-bar">
        <div class="file-preview-area" id="filePreviewArea"></div>
        <div class="input-row">
          <textarea id="chatInput" rows="1" placeholder="Message Tithonia..." autocomplete="off"></textarea>
          <button class="btn-send" id="btnSend" aria-label="Send message">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.478 2.405a.75.75 0 0 0-.926.94l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.519 60.519 0 0 0 18.445-8.986.75.75 0 0 0 0-1.218A60.517 60.517 0 0 0 3.478 2.405Z"/></svg>
          </button>
        </div>
        <div class="input-toolbar">
          <div class="input-toolbar-left">
            <button class="btn-attach" id="btnAttach" aria-label="Attach file" title="Attach images, text files, or PDFs">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
            </button>
            <input type="file" id="fileInput" hidden accept="image/*,.txt,.pdf,.md,.csv,.json,.xml,.html,.log,.py,.js,.ts,.css" multiple>
          </div>
          <div class="input-toolbar-right">
            <div class="model-selector" id="modelSelector">
              <button class="input-model-btn" id="modelSelectorBtn">
                <span class="dot"></span>
                <span id="selectedModelName">Tithonia 1.3</span>
                <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              <div class="model-dropdown" id="modelDropdown"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="input-disclaimer" id="inputDisclaimer">Tithonia 1.3 can make mistakes. Verify important information.</div>
    </div>
  </main>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
