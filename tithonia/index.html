<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tithonia - Swiftaw</title>
<meta name="description" content="Tithonia - the AI-powered assistant by Swiftaw. Smart, modern, built for you.">
<meta name="theme-color" content="#0a0a0a">
<link rel="icon" type="image/png" href="/product-logos/Tithonia icon.png">
<link href="https://fonts.cdnfonts.com/css/afronaut-test" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/AI-Models/Sprout/supabase-config.js"></script>
<script src="/AI-Models/Sprout/sprout-engine.js"></script>
<style>
/* ── Variables ── */
:root {
  --brand-deep: #241f3c;
  --brand-yellow: #fff93e;
  --brand-orange: #ff9c3c;
  --bg-dark: #0a0a0a;
  --bg-sidebar: #111111;
  --bg-chat: #0a0a0a;
  --bg-input: #1a1a1a;
  --bg-hover: #1a1a1a;
  --bg-user-msg: #1e1b2e;
  --bg-ai-msg: transparent;
  --border-color: rgba(255,255,255,.06);
  --text-primary: #f0f0f0;
  --text-secondary: rgba(255,255,255,.5);
  --text-muted: rgba(255,255,255,.3);
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-serif: 'Newsreader', Georgia, serif;
  --font-display: 'Afronaut Test', 'Newsreader', sans-serif;
  --sidebar-w: 280px;
  --input-max-w: 768px;
}

::selection { background: rgba(255,249,62,.2); }

/* ── Reset ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  background: var(--bg-dark);
  color: var(--text-primary);
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
a { text-decoration: none; color: inherit; }
button { border: none; background: none; cursor: pointer; font-family: inherit; color: inherit; }
input, textarea { font-family: inherit; }

/* ── Layout ── */
.app {
  display: flex;
  height: 100vh;
  width: 100vw;
}

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  transition: transform .25s cubic-bezier(.4,0,.2,1), opacity .25s;
  z-index: 100;
}

.sidebar-header {
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-color);
}

.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.sidebar-brand img {
  height: 28px;
}

.sidebar-brand span {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
  letter-spacing: .02em;
}

.btn-new-chat {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 12px 14px;
  margin: 12px 12px 4px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  border: 1px solid var(--border-color);
  transition: background .15s, border-color .15s;
  color: var(--text-primary);
}

.btn-new-chat:hover {
  background: var(--bg-hover);
  border-color: rgba(255,255,255,.12);
}

.btn-new-chat svg {
  width: 18px;
  height: 18px;
  opacity: .7;
}

.sidebar-section-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--text-muted);
  padding: 20px 16px 8px;
}

.chat-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 8px;
}

.chat-list::-webkit-scrollbar { width: 4px; }
.chat-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 4px; }

.chat-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 13.5px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: background .12s, color .12s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.chat-item:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.chat-item.active {
  background: rgba(255,255,255,.08);
  color: var(--text-primary);
}

.chat-item svg {
  width: 16px;
  height: 16px;
  min-width: 16px;
  opacity: .4;
}

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border-color);
}

.sidebar-footer a {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  transition: color .15s;
}

.sidebar-footer a:hover {
  color: var(--text-secondary);
}

/* ── Mobile sidebar toggle ── */
.sidebar-toggle {
  display: none;
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 200;
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: var(--bg-sidebar);
  border: 1px solid var(--border-color);
  align-items: center;
  justify-content: center;
}

.sidebar-toggle svg {
  width: 20px;
  height: 20px;
  opacity: .7;
}

.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 90;
}

/* ── Main chat area ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  position: relative;
}

/* Top bar */
.topbar {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border-color);
  min-height: 56px;
}

.topbar-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
}

/* ── Messages ── */
.messages-wrap {
  flex: 1;
  overflow-y: auto;
  scroll-behavior: smooth;
}

.messages-wrap::-webkit-scrollbar { width: 6px; }
.messages-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 6px; }

.messages {
  max-width: var(--input-max-w);
  margin: 0 auto;
  padding: 24px 24px 100px;
}

/* ── Landing state ── */
.landing {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px 120px;
  text-align: center;
}

.landing-logo {
  width: 72px;
  height: 72px;
  object-fit: contain;
  margin-bottom: 24px;
  opacity: .9;
}

.landing h1 {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 600;
  letter-spacing: .01em;
  margin-bottom: 12px;
  background: linear-gradient(135deg, var(--text-primary), var(--brand-orange));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.landing p {
  font-size: 15px;
  line-height: 1.6;
  color: var(--text-secondary);
  max-width: 460px;
  margin-bottom: 40px;
}

.suggestions {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  max-width: 520px;
  width: 100%;
}

.suggestion-card {
  padding: 16px 18px;
  border: 1px solid var(--border-color);
  border-radius: 12px;
  text-align: left;
  font-size: 13.5px;
  line-height: 1.5;
  color: var(--text-secondary);
  transition: background .15s, border-color .15s, color .15s;
  cursor: pointer;
}

.suggestion-card:hover {
  background: var(--bg-hover);
  border-color: rgba(255,255,255,.12);
  color: var(--text-primary);
}

.suggestion-card .suggestion-icon {
  font-size: 18px;
  margin-bottom: 8px;
  display: block;
}

/* ── Message bubbles ── */
.message {
  display: flex;
  gap: 14px;
  margin-bottom: 24px;
  animation: msgIn .3s ease;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.message-avatar {
  width: 32px;
  height: 32px;
  min-width: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  margin-top: 2px;
}

.message-avatar.user-avatar {
  background: var(--brand-deep);
  color: var(--brand-yellow);
}

.message-avatar.ai-avatar {
  background: transparent;
  padding: 0;
  overflow: hidden;
}

.message-avatar.ai-avatar img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.message-content {
  flex: 1;
  min-width: 0;
}

.message-sender {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--text-primary);
}

.message-text {
  font-size: 14.5px;
  line-height: 1.7;
  color: rgba(255,255,255,.82);
}

.message-text p + p {
  margin-top: 12px;
}

/* Emotional mood indicator */
.mood-indicator {
  display: inline-block;
  font-size: 11px;
  font-weight: 500;
  padding: 1px 8px;
  border-radius: 10px;
  margin-left: 8px;
  vertical-align: middle;
  opacity: 0.7;
  letter-spacing: 0.3px;
}
.mood-happy { background: rgba(255,249,62,.12); color: #fff93e; }
.mood-sad { background: rgba(100,149,237,.12); color: #6495ed; }
.mood-angry { background: rgba(255,99,71,.12); color: #ff6347; }
.mood-curious { background: rgba(138,43,226,.12); color: #ba8ef7; }
.mood-greeting { background: rgba(255,156,60,.12); color: #ff9c3c; }
.mood-grateful { background: rgba(255,182,193,.12); color: #ffb6c1; }
.mood-playful { background: rgba(0,206,209,.12); color: #00ced1; }
.mood-confused { background: rgba(255,165,0,.12); color: #ffa500; }
.mood-farewell { background: rgba(147,112,219,.12); color: #9370db; }
.mode-indicator {
  display: inline-block;
  font-size: 10px;
  font-weight: 400;
  padding: 1px 6px;
  border-radius: 8px;
  margin-left: 6px;
  vertical-align: middle;
  opacity: 0.5;
  letter-spacing: 0.2px;
  background: rgba(255,255,255,.06);
  color: rgba(255,255,255,.4);
  font-style: italic;
}
.mood-neutral { background: rgba(255,255,255,.06); color: rgba(255,255,255,.4); }

/* Typing indicator */
.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 4px 0;
}

.typing-indicator span {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--brand-orange);
  opacity: .4;
  animation: typingDot 1.4s ease-in-out infinite;
}

.typing-indicator span:nth-child(2) { animation-delay: .2s; }
.typing-indicator span:nth-child(3) { animation-delay: .4s; }

@keyframes typingDot {
  0%, 60%, 100% { opacity: .4; transform: scale(1); }
  30% { opacity: 1; transform: scale(1.2); }
}

/* ── Input bar ── */
.input-bar-wrap {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 0 24px 24px;
  background: linear-gradient(transparent, var(--bg-dark) 40%);
  pointer-events: none;
}

.input-bar {
  max-width: var(--input-max-w);
  margin: 0 auto;
  display: flex;
  align-items: flex-end;
  gap: 0;
  background: var(--bg-input);
  border: 1px solid var(--border-color);
  border-radius: 16px;
  padding: 6px 6px 6px 18px;
  transition: border-color .2s, box-shadow .2s;
  pointer-events: all;
}

.input-bar:focus-within {
  border-color: rgba(255,156,60,.3);
  box-shadow: 0 0 0 3px rgba(255,156,60,.06);
}

.input-bar textarea {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text-primary);
  font-size: 14.5px;
  line-height: 1.5;
  padding: 10px 0;
  resize: none;
  max-height: 150px;
  min-height: 22px;
}

.input-bar textarea::placeholder {
  color: var(--text-muted);
}

.btn-send {
  width: 40px;
  height: 40px;
  min-width: 40px;
  border-radius: 12px;
  background: var(--brand-orange);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s, transform .1s, opacity .15s;
  opacity: .4;
}

.btn-send.active {
  opacity: 1;
}

.btn-send.active:hover {
  background: #ffab55;
  transform: scale(1.04);
}

.btn-send svg {
  width: 18px;
  height: 18px;
  color: var(--bg-dark);
}

.input-disclaimer {
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 8px;
  pointer-events: all;
}

/* ── Model Selector ── */
.model-selector {
  position: relative;
  margin-left: 8px;
}

.model-selector-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  background: transparent;
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: background .15s;
  user-select: none;
}

.model-selector-btn:hover {
  background: var(--bg-hover);
}

.model-selector-btn .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #4ade80;
}

.model-selector-btn .chevron {
  width: 14px;
  height: 14px;
  opacity: .4;
  transition: transform .2s;
}

.model-selector.open .model-selector-btn .chevron {
  transform: rotate(180deg);
}

.model-dropdown {
  position: absolute;
  top: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  min-width: 280px;
  background: #1a1a1a;
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 12px;
  padding: 6px;
  z-index: 500;
  opacity: 0;
  visibility: hidden;
  transform: translateX(-50%) translateY(-4px);
  transition: opacity .15s, visibility .15s, transform .15s;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
}

.model-selector.open .model-dropdown {
  opacity: 1;
  visibility: visible;
  transform: translateX(-50%) translateY(0);
}

.model-option {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  width: 100%;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: background .12s;
  text-align: left;
}

.model-option:hover {
  background: rgba(255,255,255,.06);
}

.model-option.active {
  background: rgba(255,255,255,.08);
}

.model-option-check {
  width: 18px;
  height: 18px;
  min-width: 18px;
  margin-top: 1px;
  opacity: 0;
  color: var(--brand-orange);
}

.model-option.active .model-option-check {
  opacity: 1;
}

.model-option-info {
  flex: 1;
  min-width: 0;
}

.model-option-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 2px;
}

.model-option-desc {
  font-size: 11.5px;
  color: var(--text-secondary);
  line-height: 1.4;
}

.model-dropdown-divider {
  height: 1px;
  background: rgba(255,255,255,.06);
  margin: 4px 0;
}

/* ── Train Button ── */
.btn-train {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  border-radius: 8px;
  border: 1px solid var(--border-color);
  transition: background .15s, color .15s, border-color .15s;
  margin: 8px 12px;
}

.btn-train:hover {
  background: rgba(74,222,128,.06);
  border-color: rgba(74,222,128,.15);
  color: rgba(74,222,128,.8);
}

.btn-train svg {
  width: 14px;
  height: 14px;
  opacity: .6;
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    transform: translateX(-100%);
    opacity: 0;
  }

  .sidebar.open {
    transform: translateX(0);
    opacity: 1;
  }

  .sidebar-overlay.open {
    display: block;
  }

  .sidebar-toggle {
    display: flex;
  }

  .suggestions {
    grid-template-columns: 1fr;
  }

  .landing h1 {
    font-size: 26px;
  }

  .messages {
    padding: 16px 16px 100px;
  }

  .input-bar-wrap {
    padding: 0 12px 16px;
  }
}

@media (max-width: 480px) {
  .landing-logo {
    width: 56px;
    height: 56px;
  }

  .landing h1 {
    font-size: 22px;
  }

  .landing p {
    font-size: 14px;
  }
}
</style>
</head>
<body>

<div class="app">
  <!-- Mobile sidebar toggle -->
  <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

  <!-- Mobile overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <img src="/product-logos/Tithonia icon.png" alt="Tithonia">
        <span>Tithonia</span>
      </div>
    </div>

    <button class="btn-new-chat" id="btnNewChat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      New chat
    </button>

    <div class="sidebar-section-label">Recent</div>

    <div class="chat-list" id="chatList">
      <!-- Populated by JS -->
    </div>

    <a class="btn-train" href="/AI-Models/Sprout/training.html" title="Researcher access required">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
      Train Sprout
    </a>

    <div class="sidebar-footer">
      <a href="/">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back to Swiftaw
      </a>
    </div>
  </aside>

  <!-- Main area -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbarTitle">New chat</div>
      <div class="model-selector" id="modelSelector">
        <button class="model-selector-btn" id="modelSelectorBtn">
          <span class="dot"></span>
          <span id="selectedModelName">Sprout 1.2</span>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="model-dropdown" id="modelDropdown">
          <button class="model-option active" data-model="sprout-1.2">
            <svg class="model-option-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            <div class="model-option-info">
              <div class="model-option-name">Sprout 1.2</div>
              <div class="model-option-desc">Best for everyday tasks. Fast and reliable.</div>
            </div>
          </button>
        </div>
      </div>
    </div>

    <!-- Landing state -->
    <div class="landing" id="landing">
      <img class="landing-logo" src="/product-logos/tithonia logomark.png" alt="Tithonia">
      <h1>What can I help with?</h1>
      <p id="landingDesc">A modern AI assistant powered by Sprout 1.2 — built for daily help, smart project planning, quick answers, and specialized insights.</p>
      <div class="suggestions" id="suggestions">
        <button class="suggestion-card" data-prompt="Help me brainstorm ideas for a creative project">
          <span class="suggestion-icon">&#9889;</span>
          Help me brainstorm ideas for a creative project
        </button>
        <button class="suggestion-card" data-prompt="Explain quantum computing in simple terms">
          <span class="suggestion-icon">&#128218;</span>
          Explain quantum computing in simple terms
        </button>
        <button class="suggestion-card" data-prompt="Write a professional email to request time off">
          <span class="suggestion-icon">&#9997;&#65039;</span>
          Write a professional email to request time off
        </button>
        <button class="suggestion-card" data-prompt="Compare pros and cons of remote work vs office work">
          <span class="suggestion-icon">&#128161;</span>
          Compare pros and cons of remote vs office work
        </button>
      </div>
    </div>

    <!-- Messages area (hidden initially) -->
    <div class="messages-wrap" id="messagesWrap" style="display:none;">
      <div class="messages" id="messages"></div>
    </div>

    <!-- Input bar -->
    <div class="input-bar-wrap">
      <div class="input-bar">
        <textarea id="chatInput" rows="1" placeholder="Message Tithonia..." autocomplete="off"></textarea>
        <button class="btn-send" id="btnSend" aria-label="Send message">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.478 2.405a.75.75 0 0 0-.926.94l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.519 60.519 0 0 0 18.445-8.986.75.75 0 0 0 0-1.218A60.517 60.517 0 0 0 3.478 2.405Z"/></svg>
        </button>
      </div>
      <div class="input-disclaimer" id="inputDisclaimer">Tithonia is powered by Sprout 1.2. It can make mistakes. Verify important information.</div>
    </div>
  </main>
</div>

<script>
(function() {
  'use strict';

  // ── Elements ──
  const $ = (s) => document.querySelector(s);
  const landing = $('#landing');
  const messagesWrap = $('#messagesWrap');
  const messagesEl = $('#messages');
  const chatInput = $('#chatInput');
  const btnSend = $('#btnSend');
  const btnNewChat = $('#btnNewChat');
  const chatList = $('#chatList');
  const topbarTitle = $('#topbarTitle');
  const sidebar = $('#sidebar');
  const sidebarToggle = $('#sidebarToggle');
  const sidebarOverlay = $('#sidebarOverlay');
  const suggestionsEl = $('#suggestions');
  const modelSelector = $('#modelSelector');
  const modelSelectorBtn = $('#modelSelectorBtn');
  const modelDropdown = $('#modelDropdown');
  const selectedModelName = $('#selectedModelName');
  const inputDisclaimer = $('#inputDisclaimer');
  const landingDesc = $('#landingDesc');

  // ── Available Models ──
  const MODELS = {
    'sprout-1.2': {
      name: 'Sprout 1.2',
      desc: 'Best for everyday tasks. Fast and reliable.',
      engine: 'sprout'
    }
    // Future models go here:
    // 'sprout-2.0': { name: 'Sprout 2.0', desc: 'Advanced reasoning and deeper understanding.', engine: 'sprout' },
  };

  // ── State ──
  let conversations = JSON.parse(localStorage.getItem('tithonia_convos') || '[]');
  let activeConvoId = null;
  let isGenerating = false;
  let activeModel = localStorage.getItem('tithonia_model') || 'sprout-1.2';

  // ── Sprout 1.2 Engine ──
  const db = createSupabaseClient();
  const sprout = db ? new SproutEngine(db) : null;

  // ── Model Selector ──
  function renderModelDropdown() {
    modelDropdown.innerHTML = '';
    const modelKeys = Object.keys(MODELS);
    modelKeys.forEach((key, i) => {
      const m = MODELS[key];
      const btn = document.createElement('button');
      btn.className = 'model-option' + (key === activeModel ? ' active' : '');
      btn.dataset.model = key;
      btn.innerHTML = `
        <svg class="model-option-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        <div class="model-option-info">
          <div class="model-option-name">${m.name}</div>
          <div class="model-option-desc">${m.desc}</div>
        </div>`;
      btn.addEventListener('click', () => selectModel(key));
      modelDropdown.appendChild(btn);

      if (i < modelKeys.length - 1) {
        const divider = document.createElement('div');
        divider.className = 'model-dropdown-divider';
        modelDropdown.appendChild(divider);
      }
    });
  }

  function selectModel(modelKey) {
    if (!MODELS[modelKey]) return;
    activeModel = modelKey;
    localStorage.setItem('tithonia_model', modelKey);
    selectedModelName.textContent = MODELS[modelKey].name;
    inputDisclaimer.textContent = `Tithonia is powered by ${MODELS[modelKey].name}. It can make mistakes. Verify important information.`;
    landingDesc.textContent = `A modern AI assistant powered by ${MODELS[modelKey].name} — built for daily help, smart project planning, quick answers, and specialized insights.`;
    renderModelDropdown();
    closeModelSelector();
  }

  function toggleModelSelector() {
    modelSelector.classList.toggle('open');
  }

  function closeModelSelector() {
    modelSelector.classList.remove('open');
  }

  modelSelectorBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    toggleModelSelector();
  });

  document.addEventListener('click', (e) => {
    if (!modelSelector.contains(e.target)) {
      closeModelSelector();
    }
  });

  // Init model display
  if (MODELS[activeModel]) {
    selectedModelName.textContent = MODELS[activeModel].name;
    inputDisclaimer.textContent = `Tithonia is powered by ${MODELS[activeModel].name}. It can make mistakes. Verify important information.`;
  }
  renderModelDropdown();

  // ── Helpers ──
  function genId() {
    return 'c_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
  }

  function truncate(str, len) {
    return str.length > len ? str.slice(0, len) + '...' : str;
  }

  function saveConversations() {
    localStorage.setItem('tithonia_convos', JSON.stringify(conversations));
  }

  function scrollToBottom() {
    requestAnimationFrame(() => {
      messagesWrap.scrollTop = messagesWrap.scrollHeight;
    });
  }

  // ── Auto-resize textarea ──
  chatInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 150) + 'px';
    btnSend.classList.toggle('active', this.value.trim().length > 0);
  });

  // ── Send message ──
  async function sendMessage(text) {
    if (!text.trim() || isGenerating) return;

    // Create new conversation if none active
    if (!activeConvoId) {
      const convo = {
        id: genId(),
        title: truncate(text.trim(), 40),
        messages: [],
        created: Date.now()
      };
      conversations.unshift(convo);
      activeConvoId = convo.id;
      renderChatList();
    }

    // Find active conversation
    const convo = conversations.find(c => c.id === activeConvoId);
    if (!convo) return;

    // Switch to messages view
    landing.style.display = 'none';
    messagesWrap.style.display = 'block';
    topbarTitle.textContent = convo.title;

    // Add user message
    convo.messages.push({ role: 'user', text: text.trim() });
    saveConversations();
    renderMessage('user', text.trim());

    // Clear input
    chatInput.value = '';
    chatInput.style.height = 'auto';
    btnSend.classList.remove('active');

    // Show typing indicator
    isGenerating = true;
    const typingEl = renderTypingIndicator();
    scrollToBottom();

    // Get response from Sprout 1.2 engine
    if (sprout) {
      try {
        const result = await sprout.getResponse(text.trim());
        typingEl.remove();
        convo.messages.push({ role: 'assistant', text: result.answer, emotion: result.emotion, mode: result.mode });
        saveConversations();
        renderMessage('assistant', result.answer, result.emotion, result.mode);
        scrollToBottom();

        // Save conversation to Supabase for Cortex to learn from
        try {
          await sprout.saveConversation({
            messages: convo.messages,
            session_id: convo.id
          });
        } catch (e) { /* silently skip DB save failures */ }
      } catch (err) {
        typingEl.remove();
        const fallback = "I'm having trouble connecting right now. Please try again in a moment.";
        convo.messages.push({ role: 'assistant', text: fallback });
        saveConversations();
        renderMessage('assistant', fallback);
        scrollToBottom();
      }
    } else {
      // Fallback if Supabase not connected
      const delay = 1000 + Math.random() * 1500;
      setTimeout(() => {
        typingEl.remove();
        const fallback = "Sprout 1.2 is still warming up. The AI model isn't connected yet, but it will be soon!";
        convo.messages.push({ role: 'assistant', text: fallback });
        saveConversations();
        renderMessage('assistant', fallback);
        scrollToBottom();
        isGenerating = false;
      }, delay);
    }

    isGenerating = false;
  }

  // ── Render a single message ──
  const moodLabels = {
    happy: 'feeling happy',
    sad: 'feeling empathetic',
    angry: 'staying calm',
    curious: 'intrigued',
    greeting: 'welcoming',
    grateful: 'touched',
    playful: 'feeling playful',
    confused: 'here to help',
    farewell: 'saying goodbye',
    neutral: 'listening'
  };

  const modeLabels = {
    'logic-engine': 'solved with logic',
    'sprout-brain': 'thought about it',
    'feedback-loop': 'learning from feedback',
    'feedback-retry': 'trying again',
    'lookup': 'from knowledge base',
    'cached': 'remembered',
    'context-aware': 'understood context'
  };

  function renderMessage(role, text, emotion, mode) {
    const div = document.createElement('div');
    div.className = 'message';

    if (role === 'user') {
      div.innerHTML = `
        <div class="message-avatar user-avatar">Y</div>
        <div class="message-content">
          <div class="message-sender">You</div>
          <div class="message-text">${escapeHtml(text)}</div>
        </div>`;
    } else {
      const moodClass = emotion ? `mood-${emotion}` : 'mood-neutral';
      const moodText = emotion ? (moodLabels[emotion] || 'listening') : 'listening';
      const modeText = mode ? (modeLabels[mode] || '') : '';
      const modeHtml = modeText ? ` <span class="mode-indicator">${modeText}</span>` : '';
      div.innerHTML = `
        <div class="message-avatar ai-avatar">
          <img src="/product-logos/Tithonia icon.png" alt="Tithonia">
        </div>
        <div class="message-content">
          <div class="message-sender">Tithonia <span class="mood-indicator ${moodClass}">${moodText}</span>${modeHtml}</div>
          <div class="message-text">${escapeHtml(text)}</div>
        </div>`;
    }

    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function renderTypingIndicator() {
    const div = document.createElement('div');
    div.className = 'message';
    div.id = 'typingMsg';
    div.innerHTML = `
      <div class="message-avatar ai-avatar">
        <img src="/product-logos/Tithonia icon.png" alt="Tithonia">
      </div>
      <div class="message-content">
        <div class="message-sender">Tithonia</div>
        <div class="typing-indicator"><span></span><span></span><span></span></div>
      </div>`;
    messagesEl.appendChild(div);
    return div;
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // ── Render all messages for active convo ──
  function renderAllMessages() {
    messagesEl.innerHTML = '';
    const convo = conversations.find(c => c.id === activeConvoId);
    if (!convo) return;
    convo.messages.forEach(m => renderMessage(m.role, m.text, m.emotion, m.mode));
    scrollToBottom();
  }

  // ── Chat list in sidebar ──
  function renderChatList() {
    chatList.innerHTML = '';
    conversations.forEach(convo => {
      const item = document.createElement('div');
      item.className = 'chat-item' + (convo.id === activeConvoId ? ' active' : '');
      item.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span>${escapeHtml(convo.title)}</span>`;
      item.addEventListener('click', () => loadConversation(convo.id));
      chatList.appendChild(item);
    });
  }

  // ── Load a conversation ──
  function loadConversation(id) {
    activeConvoId = id;
    const convo = conversations.find(c => c.id === id);
    if (!convo) return;

    landing.style.display = 'none';
    messagesWrap.style.display = 'block';
    topbarTitle.textContent = convo.title;
    renderAllMessages();
    renderChatList();
    closeSidebar();
  }

  // ── New chat ──
  function newChat() {
    activeConvoId = null;
    messagesEl.innerHTML = '';
    messagesWrap.style.display = 'none';
    landing.style.display = '';
    topbarTitle.textContent = 'New chat';
    renderChatList();
    closeSidebar();
    chatInput.focus();
  }

  // ── Sidebar mobile ──
  function openSidebar() {
    sidebar.classList.add('open');
    sidebarOverlay.classList.add('open');
  }

  function closeSidebar() {
    sidebar.classList.remove('open');
    sidebarOverlay.classList.remove('open');
  }

  // ── Event listeners ──
  btnSend.addEventListener('click', () => sendMessage(chatInput.value));

  chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(chatInput.value);
    }
  });

  btnNewChat.addEventListener('click', newChat);
  sidebarToggle.addEventListener('click', openSidebar);
  sidebarOverlay.addEventListener('click', closeSidebar);

  // Suggestion cards
  suggestionsEl.addEventListener('click', (e) => {
    const card = e.target.closest('.suggestion-card');
    if (card) {
      const prompt = card.dataset.prompt;
      chatInput.value = prompt;
      sendMessage(prompt);
    }
  });

  // ── Init ──
  renderChatList();
  chatInput.focus();
})();
</script>
</body>
</html>
